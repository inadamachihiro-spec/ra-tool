<script>
const SL={active:"商談中",approval:"稟議中",contracted:"契約済み",review:"契約内容見直し中",shrink:"シュリンク"};
const SC={active:"s-active",approval:"s-approval",contracted:"s-contracted",review:"s-review",shrink:"s-shrink"};
const STAFF={inadama:{label:"稲玉千尋",bg:"#EEEDFE",tc:"#3C3489",s:"稲"},takemura:{label:"竹村厚美",bg:"#EAF3DE",tc:"#3B6D11",s:"竹"}};
const JC=[
  {key:"all",label:"すべて",icon:"ti-layout-grid"},
  {key:"it",label:"IT・エンジニア",icon:"ti-device-laptop"},
  {key:"construction",label:"建設・施工管理",icon:"ti-building-skyscraper"},
  {key:"sales",label:"営業",icon:"ti-speakerphone"},
  {key:"office",label:"事務・バックオフィス",icon:"ti-briefcase"},
  {key:"service",label:"販売・サービス",icon:"ti-shopping-bag"},
  {key:"other",label:"その他",icon:"ti-dots"},
];
const MONTHS=["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];

const GAS_URL = 'https://script.google.com/macros/s/AKfycbxjHZc8bOGPrQbQl0d8H9U8sbXee9Qxie8mYH4m-qTOgnaInsJrhoDdLyDQNGmLDD2_tg/exec';

let companies=[];
let selId=null,filterText="",activeJC="all",activeStaff="all";
let mCTs=[],mPOs=[],editId=null;
let isSaving=false;

/* ── GAS通信 ── */
function jsonpCall(baseUrl,params){
  return new Promise((resolve,reject)=>{
    const cbName='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{
      delete window[cbName];
      if(script.parentNode)document.body.removeChild(script);
      reject(new Error('タイムアウト'));
    },20000);
    window[cbName]=(data)=>{
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode)document.body.removeChild(script);
      resolve(data);
    };
    script.onerror=()=>{clearTimeout(timer);reject(new Error('通信エラー'));};
    script.src=baseUrl+(baseUrl.includes('?')?'&':'?')+params+'&callback='+cbName;
    document.body.appendChild(script);
  });
}

async function gasRead(){
  const res=await jsonpCall(GAS_URL,'action=read');
  return res.data||[];
}

async function gasWrite(data){
  const json=JSON.stringify(data);
  const CHUNK=800;
  const chunks=[];
  for(let i=0;i<json.length;i+=CHUNK) chunks.push(json.slice(i,i+CHUNK));

  await jsonpCall(GAS_URL,'action=write_start&total='+chunks.length);

  for(let i=0;i<chunks.length;i++){
    await jsonpCall(GAS_URL,'action=write_chunk&idx='+i+'&data='+encodeURIComponent(chunks[i]));
  }

  await jsonpCall(GAS_URL,'action=write_finish');
}

/* データ正規化（フィールド不足を補完） */
function normalize(d){
  d.forEach(c=>{
    if(!c.bizCards)c.bizCards=[];
    if(!c._triggers)c._triggers=[];
    if(!c.notionLinks)c.notionLinks=[];
    if(!c.docs)c.docs=[];
    if(!c.negotiations)c.negotiations=[];
    if(!c.checklist)c.checklist=[];
    if(!c.refund)c.refund={rate:"",period:"",condition:"",memo:""};
    c.positions=c.positions||[];
    c.positions.forEach(p=>{
      if(!p.notionLinks)p.notionLinks=[];
      if(!p.monthly)p.monthly={plan:{},achieved:{}};
      if(!p.feeType)p.feeType="normal";
      if(!p.feeCondition)p.feeCondition="";
      if(!p.referralFee)p.referralFee="";
      if(!p.annualCount)p.annualCount="";
      if(!p.memo)p.memo="";
      if(!p.posStatus)p.posStatus="open";
      if(!p.fiscalMonth)p.fiscalMonth="";
      if(!p.budgetTiming)p.budgetTiming="";
    });
  });
  return d;
}

/* 保存：GAS + localStorageキャッシュ */
async function save(){
  localStorage.setItem('ra_v5_cache', JSON.stringify(companies));
  if(isSaving)return;
  isSaving=true;
  showSaveStatus('saving');
  try{
    await gasWrite(companies);
    // no-corsでは応答が取れないので送信完了で保存済みとみなす
    showSaveStatus('saved');
  }catch(e){
    showSaveStatus('error');
  }finally{
    isSaving=false;
  }
}

function showSaveStatus(state){
  const el=document.getElementById('save-status');
  if(!el)return;
  if(state==='saving'){el.textContent='保存中...';el.style.color='#aaa';}
  else if(state==='saved'){el.textContent='✓ 保存済み';el.style.color='#3B6D11';setTimeout(()=>{el.textContent='';},2000);}
  else{el.textContent='⚠ 保存失敗（ローカルに保持）';el.style.color='#A32D2D';}
}

/* 初期ロード */
async function initLoad(){
  const detail=document.getElementById('detailPanel');
  detail.innerHTML='<div class="empty-d"><i class="ti ti-loader" style="font-size:28px;animation:spin 1s linear infinite;"></i><span style="margin-top:8px;">データを読み込み中...</span></div>';
  try{
    let data=await gasRead();
    if(!data||data.length===0){
      // localStorageキャッシュがあれば移行
      const cache=localStorage.getItem('ra_v5_cache')||localStorage.getItem('ra_v5')||localStorage.getItem('ra_v4');
      if(cache){
        data=JSON.parse(cache);
        await gasWrite(data); // キャッシュをシートに書き込む
      }
    }
    companies=normalize(data);
  }catch(e){
    // オフライン時はキャッシュから
    const cache=localStorage.getItem('ra_v5_cache')||localStorage.getItem('ra_v5');
    companies=cache?normalize(JSON.parse(cache)):[];
    showSaveStatus('error');
  }
  detail.innerHTML='<div class="empty-d"><i class="ti ti-building" style="font-size:32px;"></i>企業を選択してください</div>';
  renderJT();
  renderList();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sb(s){return `<span class="sb ${SC[s]||'s-active'}">${SL[s]||s}</span>`;}

function renderJT(){
  document.getElementById("jobTabs").innerHTML=JC.map(j=>{
    const n=j.key==="all"?companies.length:companies.filter(c=>c.jobcat===j.key).length;
    return `<div class="job-tab ${activeJC===j.key?'active':''}" onclick="setJC('${j.key}')">
      <span style="display:flex;align-items:center;gap:5px;"><i class="ti ${j.icon}" style="font-size:12px;"></i>${j.label}</span>

}
function setJC(c){activeJC=c;renderJT();renderList();}
function setStaff(s){
  activeStaff=s;
  ["all","inadama","takemura"].forEach(k=>document.getElementById("sf-"+k).className="staff-btn"+(k===s?" active":""));
  document.getElementById("listTitle").textContent=s==="all"?"企業一覧":STAFF[s].label+"の担当";

}

/* ── 企業リスト ── */
function filterList(v){filterText=v.toLowerCase();renderList();}
function renderList(){
  const el=document.getElementById("coList");
  const list=companies.filter(c=>{
    if(activeJC!=="all"&&c.jobcat!==activeJC)return false;
    if(activeStaff!=="all"&&c.staff!==activeStaff)return false;
    if(filterText&&!c.name.toLowerCase().includes(filterText))return false;
    return true;
  });
  el.innerHTML=list.map(c=>{
    const undone=c.checklist.filter(x=>!x.done&&x.priority==="high").length;
    const st=STAFF[c.staff];
    return `<div class="co-card ${selId===c.id?'selected':''}" onclick="selCo(${c.id})">

function swTab(tab,id){

    if(ct)ct.style.display=t===tab?"block":"none";
  });
}

function negHTML(cid,n){
  return `
    <div class="neg-hdr">
      <span class="neg-date">${n.date}</span>
      <span class="neg-type-badge">${n.type}</span>
      <div style="margin-left:auto;display:flex;gap:2px;">
        <button class="icon-btn" title="編集" onclick="startEditNeg(${cid},${n.id})"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" title="削除" onclick="removeNeg(${cid},${n.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>
    <div class="neg-body">${esc(n.content)}</div>
    ${n.nextAction?`<div class="neg-next-box"><i class="ti ti-arrow-right"></i>次回：${esc(n.nextAction)}</div>`:''}`;
}

function addNeg(cid){
  const c=companies.find(x=>x.id===cid);
  const body=document.getElementById(`nb-${cid}`).value.trim();
  if(!body){alert("折衝内容を入力してください");return;}
  const newId=Math.max(0,...c.negotiations.map(x=>x.id))+1;
  c.negotiations.push({id:newId,date:document.getElementById(`nd-${cid}`).value,type:document.getElementById(`nt-${cid}`).value,content:body,nextAction:document.getElementById(`nn-${cid}`).value});
  document.getElementById(`nb-${cid}`).value="";
  document.getElementById(`nn-${cid}`).value="";
  save();selCo(cid);swTab('neg',cid);
}
function removeNeg(cid,id){
  if(!confirm("この折衝記録を削除しますか？"))return;
  companies.find(x=>x.id===cid).negotiations=companies.find(x=>x.id===cid).negotiations.filter(x=>x.id!==id);
  save();selCo(cid);swTab('neg',cid);
}
function startEditNeg(cid,nid){
  const c=companies.find(x=>x.id===cid);
  const n=c.negotiations.find(x=>x.id===nid);
  const types=["電話","メール確認","訪問","オンライン商談","内定承諾","書類選考","その他"];
  const el=document.getElementById(`ni-${cid}-${nid}`);
  if(!el)return;
  el.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:7px;">
      <div class="frow">
        <input class="fi" type="date" id="ed-${cid}-${nid}" value="${n.date}" style="flex:1;">
        <select class="fi" id="et-${cid}-${nid}" style="flex:1;">${types.map(t=>`<option${n.type===t?' selected':''}>${t}</option>`).join('')}</select>
      </div>
      <textarea class="ta" id="eb-${cid}-${nid}" style="min-height:100px;">${n.content}</textarea>
      <input class="fi" type="text" id="en-${cid}-${nid}" value="${n.nextAction||''}" placeholder="次回アクション">
      <div style="display:flex;gap:6px;justify-content:flex-end;">
        <button class="btn sm" onclick="cancelEditNeg(${cid},${nid})">キャンセル</button>
        <button class="btn primary sm" onclick="saveEditNeg(${cid},${nid})"><i class="ti ti-device-floppy"></i>保存</button>
      </div>
    </div>`;
}
function saveEditNeg(cid,nid){
  const c=companies.find(x=>x.id===cid),n=c.negotiations.find(x=>x.id===nid);
  n.date=document.getElementById(`ed-${cid}-${nid}`).value;
  n.type=document.getElementById(`et-${cid}-${nid}`).value;
  n.content=document.getElementById(`eb-${cid}-${nid}`).value;
  n.nextAction=document.getElementById(`en-${cid}-${nid}`).value;
  save();selCo(cid);swTab('neg',cid);
}
function cancelEditNeg(cid,nid){
  const c=companies.find(x=>x.id===cid),n=c.negotiations.find(x=>x.id===nid);
  const el=document.getElementById(`ni-${cid}-${nid}`);
  if(el)el.innerHTML=negHTML(cid,n);
}

/* ── 確認事項 ── */
function renderChk(c){
  const done=c.checklist.filter(x=>x.done).length;
  const pct=c.checklist.length?Math.round(done/c.checklist.length*100):0;
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;"><div class="prog"><div class="prog-f" style="width:${pct}%;"></div></div><span style="font-size:11px;color:#aaa;">${done}/${c.checklist.length}</span></div>
    <div id="cl-${c.id}">${c.checklist.map(i=>ciHTML(c.id,i)).join('')}</div>
    <div style="display:flex;gap:5px;margin-top:12px;">
      <select id="clp-${c.id}" style="padding:6px 7px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff;width:58px;"><option value="high">高</option><option value="med" selected>中</option><option value="low">低</option></select>
      <input class="fi" type="text" id="cli-${c.id}" placeholder="確認事項を追加..." onkeydown="if(event.key==='Enter')addChk(${c.id})">
      <button class="btn primary sm" onclick="addChk(${c.id})"><i class="ti ti-plus"></i></button>
    </div>
    <div class="divider"></div>
    <label class="fl">メモ</label>
    <textarea class="ta" onblur="upF(${c.id},'checkMemo',this.value)">${esc(c.checkMemo||'')}</textarea>`;
}
function ciHTML(cid,item){
  const pc=item.priority==='high'?'ph':item.priority==='med'?'pm':'pl';
  const pl=item.priority==='high'?'優先高':item.priority==='med'?'優先中':'優先低';
  return `<div class="ci"><div class="cb ${item.done?'checked':''}" onclick="togChk(${cid},${item.id})">${item.done?'<i class="ti ti-check"></i>':''}</div><div style="flex:1;"><div class="cl ${item.done?'done':''}">${esc(item.text)}</div>${item.note?`<div style="font-size:11px;color:#aaa;margin-top:1px;">${esc(item.note)}</div>`:''}</div><span class="cpri ${pc}">${pl}</span></div>`;
}

    const cts=c.contacts.length>0?c.contacts:[{name:"",dept:"",phone:"",email:""}];
    const pos=c.positions.length>0?c.positions:[{name:"",budget:0,fiscalMonth:"",budgetTiming:"",referralFee:"",feeType:"",feeCondition:"",annualCount:"",memo:"",posStatus:"",monthly:{plan:{},achieved:{}}}];
    const ln=c.negotiations.length>0?[...c.negotiations].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
    pos.forEach((p,pi)=>{
      cts.forEach((ct,ci)=>{
        const pv=M.map(m=>p.monthly?.plan?.[m]||"");const av=M.map(m=>p.monthly?.achieved?.[m]||"");
        const pt=M.reduce((a,m)=>a+(parseInt(p.monthly?.plan?.[m])||0),0);const at=M.reduce((a,m)=>a+(parseInt(p.monthly?.achieved?.[m])||0),0);
        const f=ci===0&&pi===0;
        rows.push([
          f?c.name:"",f?c.industry||"":"",f?c.size||"":"",f?JL_[c.jobcat]||"":"",f?SL_[c.status]||"":"",f?STAFF_[c.staff]||"":"",f?c.channel||"":"",f?c.nextAction||"":"",
          ct.name||"",ct.dept||"",ct.phone||"",ct.email||"",
          ci===0?p.name||"":"",ci===0?p.budget||"":"",ci===0?p.fiscalMonth||"":"",ci===0?p.budgetTiming||"":"",ci===0?p.referralFee||"":"",ci===0?p.feeType||"":"",ci===0?p.feeCondition||"":"",ci===0?p.annualCount||"":"",ci===0?p.memo||"":"",ci===0?p.posStatus||"":"",
          ...(ci===0?pv:M.map(()=>"")),ci===0?pt:"",
          ...(ci===0?av:M.map(()=>"")),ci===0?at:"",
          f?c.refund?.rate||"":"",f?c.refund?.period||"":"",f?c.refund?.condition||"":"",f?c.refund?.memo||"":"",
          f?ln?.date||"":"",f?ln?.content||"":"",f?ln?.nextAction||"":"",f?c.memo||"":""
        ]);
      });
    });
  });
  const csv="\uFEFF"+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=(mode==='single'?targets[0].name+'_':'RA企業管理_')+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

initLoad();
</script>
