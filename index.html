<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RA企業管理ツール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;}
.app{display:flex;height:100vh;}
.sidebar{width:180px;flex-shrink:0;border-right:1px solid #e5e5e0;padding:12px 0;background:#fafaf8;display:flex;flex-direction:column;}
.sidebar-logo{font-size:13px;font-weight:600;padding:0 14px 12px;border-bottom:1px solid #e5e5e0;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-label{font-size:10px;color:#bbb;padding:0 14px 3px;letter-spacing:.05em;text-transform:uppercase;}
.home-nav{margin:0 8px 8px;}
.home-btn{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:#666;font-weight:500;}
.home-btn:hover{background:#f0f0ea;}
.home-btn.active{background:#534AB7;color:#fff;}
.job-tabs{display:flex;flex-direction:column;gap:1px;padding:3px 8px 6px;}
.job-tab{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:#666;}
.job-tab:hover{background:#f0f0ea;}
.job-tab.active{background:#EEEDFE;color:#3C3489;font-weight:500;}
.jtc{font-size:10px;padding:1px 5px;border-radius:20px;background:#e5e5e0;color:#888;}
.job-tab.active .jtc{background:#534AB7;color:#fff;}
.staff-filter{padding:8px 14px;border-top:1px solid #e5e5e0;margin-top:4px;}
.staff-label{font-size:10px;color:#bbb;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.staff-btn{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:7px;cursor:pointer;font-size:11px;color:#666;margin-bottom:2px;}
.staff-btn:hover{background:#f0f0ea;}
.staff-btn.active{background:#EEEDFE;color:#3C3489;font-weight:500;}
.sav{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;color:#fff;}
.staff-row{display:flex;align-items:center;gap:4px;}
.staff-row .staff-btn{flex:1;}
.staff-add-btn{padding:5px 8px;border-radius:7px;cursor:pointer;color:#aaa;font-size:13px;display:flex;align-items:center;justify-content:center;}
.staff-add-btn:hover{background:#f0f0ea;color:#534AB7;}
.staff-del-btn{padding:3px;border-radius:6px;cursor:pointer;color:#ccc;font-size:12px;display:flex;align-items:center;}
.staff-del-btn:hover{background:#fde;color:#A32D2D;}
.main{width:272px;flex-shrink:0;border-right:1px solid #e5e5e0;display:flex;flex-direction:column;}
.topbar{padding:9px 12px;border-bottom:1px solid #e5e5e0;display:flex;align-items:center;gap:7px;background:#fff;}
.topbar h1{font-size:13px;font-weight:500;flex:1;}
.btn{padding:5px 11px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:12px;cursor:pointer;color:#1a1a1a;display:inline-flex;align-items:center;gap:4px;transition:background .1s;}
.btn:hover{background:#f5f5f0;}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7;}
.btn.primary:hover{background:#3C3489;}
.btn.danger{color:#A32D2D;border-color:#fcc;background:#fff;}
.btn.sm{padding:3px 8px;font-size:11px;}
.content{flex:1;overflow-y:auto;padding:9px;}
.search-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid #e5e5e0;border-radius:8px;background:#fff;margin-bottom:7px;}
.search-bar input{border:none;background:transparent;flex:1;font-size:12px;outline:none;}
.co-list{display:flex;flex-direction:column;gap:5px;}
.co-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:9px 11px;cursor:pointer;}
.co-card:hover{border-color:#bbb;}
.co-card.selected{border-color:#534AB7;background:#fdfcff;}
.co-top{display:flex;align-items:center;gap:7px;}
.co-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px;flex-shrink:0;background:#EEEDFE;color:#3C3489;}
.co-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.s-active{background:#EAF3DE;color:#3B6D11;}
.s-approval{background:#E6F1FB;color:#0C447C;}
.s-contracted{background:#EEEDFE;color:#3C3489;}
.s-review{background:#FAEEDA;color:#633806;}
.s-shrink{background:#FCEBEB;color:#A32D2D;}
.co-btm{display:flex;align-items:center;gap:8px;margin-top:5px;}
.mchip{display:flex;align-items:center;gap:3px;font-size:10px;color:#aaa;}
/* 右パネル */
.detail{flex:1;overflow:hidden;background:#fff;display:flex;flex-direction:column;}
.d-header{padding:14px 18px;border-bottom:1px solid #e5e5e0;flex-shrink:0;}
.d-name{font-size:16px;font-weight:600;}
.d-sub{font-size:11px;color:#999;margin-top:2px;}
.d-actions{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center;}
.tab-bar{display:flex;border-bottom:1px solid #e5e5e0;padding:0 18px;flex-shrink:0;overflow-x:auto;}
.tab{padding:9px 0;margin-right:14px;font-size:12px;cursor:pointer;color:#999;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:#1a1a1a;border-bottom-color:#534AB7;font-weight:500;}
.d-body{flex:1;overflow-y:auto;}
.d-content{padding:18px;}
/* フォーム共通 */
.fl{font-size:10px;color:#999;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;font-weight:500;}
.fi{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;}
.fi:focus{outline:none;border-color:#534AB7;}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.fg{margin-bottom:11px;}
.ta{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;background:#fff;color:#1a1a1a;}
.ta:focus{outline:none;border-color:#534AB7;}
.divider{border:none;border-top:1px solid #f0f0ea;margin:14px 0;}
/* 折衝 */
.neg-item{background:#fafaf8;border-radius:10px;padding:13px 15px;margin-bottom:10px;border-left:3px solid #534AB7;}
.neg-hdr{display:flex;align-items:center;gap:8px;margin-bottom:7px;flex-wrap:wrap;}
.neg-date{font-size:12px;font-weight:500;color:#534AB7;}
.neg-type-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#EEEDFE;color:#3C3489;}
.neg-author-badge{font-size:10px;padding:2px 7px;border-radius:20px;background:#f0f0ea;color:#666;display:flex;align-items:center;gap:3px;}
.neg-body{font-size:13px;line-height:1.7;white-space:pre-wrap;}
.neg-next-box{font-size:12px;color:#444;display:flex;align-items:flex-start;gap:6px;background:#f0f0ea;border-radius:6px;padding:7px 10px;margin-top:8px;}
.neg-next-box i{color:#534AB7;font-size:14px;flex-shrink:0;margin-top:1px;}
/* 担当者 */
.ct-card{background:#fafaf8;border-radius:8px;padding:11px 13px;margin-bottom:7px;}
/* ポジション */
.pos-block{background:#fafaf8;border-radius:10px;padding:14px 16px;margin-bottom:14px;border:1px solid #e5e5e0;}
.pos-name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.pos-badge{font-size:10px;padding:2px 7px;border-radius:20px;}
.pb-open{background:#EAF3DE;color:#3B6D11;}
.pb-stop{background:#F1EFE8;color:#555;}
.pb-filled{background:#E6F1FB;color:#0C447C;}
.month-table{width:100%;border-collapse:collapse;font-size:12px;}
.month-table th{font-size:10px;color:#999;padding:4px 5px;text-align:center;border-bottom:1px solid #e5e5e0;}
.month-table td{padding:4px 5px;text-align:center;border-bottom:1px solid #f0f0ea;}
.month-table input{width:40px;padding:3px 2px;border:1px solid #ddd;border-radius:5px;font-size:11px;text-align:center;background:#fff;}
.pos-field-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px;background:#fff;border:1px solid #e5e5e0;border-radius:8px;padding:10px 12px;}
.pf-item label{font-size:10px;color:#aaa;display:flex;align-items:center;gap:3px;margin-bottom:3px;}
.pf-item input,.pf-item select{width:100%;border:none;border-bottom:1px solid #ddd;background:transparent;font-size:12px;outline:none;padding:2px 0;}
.pf-item input:focus,.pf-item select:focus{border-bottom-color:#534AB7;}
/* 書類 */
.doc-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fafaf8;border-radius:8px;margin-bottom:5px;}
.notion-row{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fafaf8;border-radius:8px;margin-bottom:5px;}
.refund-box{background:#fafaf8;border-radius:8px;padding:12px 14px;}
.rr{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0ea;align-items:flex-start;}
.rr:last-child{border-bottom:none;}
.rl{font-size:11px;color:#999;width:96px;flex-shrink:0;padding-top:2px;}
.rv{flex:1;}
.rv input,.rv textarea{width:100%;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;resize:vertical;line-height:1.5;}
/* チェック */
.ci{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0ea;}
.ci:last-child{border-bottom:none;}
.cb{width:17px;height:17px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff;}
.cb.checked{background:#534AB7;border-color:#534AB7;}
.cb.checked i{color:#fff;font-size:11px;}
.cl{font-size:13px;flex:1;line-height:1.5;}
.cl.done{color:#aaa;text-decoration:line-through;}
.cpri{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0;}
.ph{background:#FCEBEB;color:#A32D2D;}
.pm{background:#FAEEDA;color:#633806;}
.pl{background:#F5F5F0;color:#666;}
.prog{height:5px;background:#f0f0ea;border-radius:4px;overflow:hidden;flex:1;}
.prog-f{height:100%;background:#534AB7;border-radius:4px;}
.icon-btn{padding:4px 5px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#aaa;display:inline-flex;align-items:center;font-size:14px;}
.icon-btn:hover{background:#f0f0ea;color:#1a1a1a;}
.empty-d{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ccc;font-size:13px;gap:10px;}
.add-box{background:#fafaf8;border-radius:10px;padding:13px;border:1px dashed #ddd;margin-top:8px;}
.add-box-title{font-size:11px;font-weight:600;color:#555;margin-bottom:9px;}
.sec-title{font-size:11px;font-weight:600;color:#555;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.kintone-banner{background:#f0f7ff;border:1px solid #bcd6f7;border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:8px;font-size:11px;color:#1a5fa8;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
/* ホーム画面 */
.home-wrap{flex:1;overflow-y:auto;background:#fff;padding:32px 40px;}
.home-title{font-size:22px;font-weight:700;margin-bottom:6px;}
.home-sub{font-size:13px;color:#999;margin-bottom:24px;}
.home-card{background:#fafaf8;border:1px solid #e5e5e0;border-radius:14px;padding:20px 22px;margin-bottom:18px;max-width:760px;}
.home-card-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px;color:#3C3489;}
.link-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e5e5e0;border-radius:10px;margin-bottom:8px;}
.link-row i.lk-icon{font-size:18px;color:#534AB7;flex-shrink:0;}
.link-row .lk-title{font-size:13px;font-weight:500;flex:1;}
.link-row .lk-url{font-size:11px;color:#aaa;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px;}
.rule-box{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.9;white-space:pre-wrap;color:#333;min-height:80px;}
.go-tool-btn{display:inline-flex;align-items:center;gap:8px;background:#534AB7;color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;margin-top:6px;}
.go-tool-btn:hover{background:#3C3489;}
/* モーダル */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-start;justify-content:center;padding:28px 16px;overflow-y:auto;}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:22px;width:520px;max-width:100%;}
.modal-title{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.fl2{font-size:11px;color:#999;margin-bottom:3px;display:block;letter-spacing:.04em;text-transform:uppercase;}
.entry-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f5f5f0;border-radius:8px;margin-bottom:4px;font-size:12px;}
.csv-drop{border:2px dashed #ddd;border-radius:10px;padding:24px;text-align:center;color:#aaa;font-size:12px;cursor:pointer;}
.csv-drop:hover{border-color:#534AB7;color:#534AB7;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><i class="ti ti-building"></i>RA管理</div>
    <div class="home-nav">
      <div class="home-btn active" id="nav-home" onclick="showHome()"><i class="ti ti-home" aria-hidden="true"></i>ホーム</div>
    </div>
    <div class="sec-label">職種</div>
    <div class="job-tabs" id="jobTabs"></div>
    <div class="staff-filter">
      <div class="staff-label"><span>担当者</span><span class="staff-add-btn" onclick="openAddStaffModal()" title="担当者を追加"><i class="ti ti-plus" aria-hidden="true"></i></span></div>
      <div class="staff-btn active" id="sf-all" onclick="setStaff('all')"><div class="sav" style="background:#888;">全</div>全員</div>
      <div id="staffListSidebar"></div>
    </div>
    <div style="flex:1;"></div>
    <div style="padding:9px 14px;font-size:10px;color:#ccc;border-top:1px solid #e5e5e0;">ver 6.0</div>
  </div>

  <div id="mainArea" style="display:flex;flex:1;overflow:hidden;">
    <div class="main">
      <div class="topbar">
        <h1 id="listTitle">企業一覧</h1>
        <span id="save-status" style="font-size:11px;margin-right:4px;"></span>
        <button class="btn sm" onclick="openImportExportModal()" title="CSV入出力"><i class="ti ti-table-export" aria-hidden="true"></i></button>
        <button class="btn primary sm" onclick="openAddModal()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
      </div>
      <div class="content">
        <div class="search-bar"><i class="ti ti-search" style="font-size:13px;color:#ccc;" aria-hidden="true"></i><input type="text" placeholder="企業名で検索..." oninput="filterList(this.value)"></div>
        <div class="co-list" id="coList"></div>
      </div>
    </div>
    <div class="detail" id="detailPanel"><div class="empty-d"><i class="ti ti-building" style="font-size:32px;" aria-hidden="true"></i>企業を選択してください</div></div>
  </div>

  <div id="homeArea" class="home-wrap" style="display:none;"></div>
</div>

<!-- 企業追加モーダル -->
<div class="modal-ov" id="modalOv">
  <div class="modal">
    <div class="modal-title"><span id="modalTitle">企業を追加</span><button class="icon-btn" onclick="closeModal()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div class="frow"><div class="fg" style="flex:2;"><label class="fl2">企業名 *</label><input class="fi" type="text" id="m-name"></div><div class="fg"><label class="fl2">従業員規模</label><input class="fi" type="text" id="m-size"></div></div>
    <div class="frow"><div class="fg"><label class="fl2">業種</label><input class="fi" type="text" id="m-industry"></div><div class="fg"><label class="fl2">主要職種</label><select class="fi" id="m-jobcat"><option value="all">未分類</option><option value="it">IT・エンジニア</option><option value="construction">建設・施工管理</option><option value="sales">営業</option><option value="office">事務・バックオフィス</option><option value="service">販売・サービス</option><option value="other">その他</option></select></div></div>
    <div class="frow"><div class="fg"><label class="fl2">成約状況</label><select class="fi" id="m-status"><option value="active">商談中</option><option value="approval">稟議中</option><option value="contracted">契約済み</option><option value="review">契約内容見直し中</option><option value="shrink">シュリンク</option></select></div><div class="fg"><label class="fl2">自社担当</label><select class="fi" id="m-staff"></select></div></div>
    <div class="divider"></div>
    <div class="add-box-title">企業側担当者</div>
    <div id="m-ct-list"></div>
    <div style="background:#fafaf8;border-radius:8px;padding:11px;">
      <div class="frow"><input class="fi" type="text" id="mc-name" placeholder="担当者名"><input class="fi" type="text" id="mc-dept" placeholder="部署"></div>
      <div class="frow" style="margin-top:5px;"><input class="fi" type="text" id="mc-role" placeholder="役職"><input class="fi" type="text" id="mc-phone" placeholder="電話番号"></div>
      <input class="fi" type="text" id="mc-email" placeholder="メールアドレス" style="margin-top:5px;">
      <button class="btn sm" style="margin-top:7px;" onclick="addMC()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
    </div>
    <div class="divider"></div>
    <div class="add-box-title">採用ポジション</div>
    <div id="m-pos-list"></div>
    <div style="background:#fafaf8;border-radius:8px;padding:11px;">
      <input class="fi" type="text" id="mp-name" placeholder="ポジション名">
      <button class="btn sm" style="margin-top:7px;" onclick="addMP()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
    </div>
    <div class="divider"></div>
    <label class="fl2">備考・メモ</label>
    <textarea class="ta" id="m-memo" style="min-height:55px;"></textarea>
    <div style="display:flex;gap:7px;justify-content:flex-end;margin-top:14px;"><button class="btn" onclick="closeModal()">キャンセル</button><button class="btn primary" onclick="saveCompany()">保存する</button></div>
  </div>
</div>

<!-- 担当者追加モーダル -->
<div class="modal-ov" id="staffModalOv">
  <div class="modal" style="width:380px;">
    <div class="modal-title"><span>担当者を管理</span><button class="icon-btn" onclick="closeStaffModal()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div id="staffMgmtList" style="margin-bottom:14px;"></div>
    <div class="divider"></div>
    <div class="add-box-title">新しい担当者を追加</div>
    <input class="fi" type="text" id="new-staff-name" placeholder="担当者名（例: 山田太郎）">
    <button class="btn primary sm" style="margin-top:8px;" onclick="addNewStaff()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
  </div>
</div>

<!-- CSV入出力モーダル -->
<div class="modal-ov" id="csvModalOv">
  <div class="modal" style="width:480px;">
    <div class="modal-title"><span>CSV入出力</span><button class="icon-btn" onclick="closeCsvModal()"><i class="ti ti-x" aria-hidden="true"></i></button></div>
    <div class="add-box-title">エクスポート</div>
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <button class="btn primary sm" onclick="exportCSV('list')"><i class="ti ti-download" aria-hidden="true"></i>表示中の企業をCSV出力</button>
      <button class="btn sm" onclick="exportCSV('all')"><i class="ti ti-download" aria-hidden="true"></i>全件CSV出力</button>
    </div>
    <div class="divider"></div>
    <div class="add-box-title">インポート（一括登録・上書き）</div>
    <p style="font-size:11px;color:#aaa;margin-bottom:10px;line-height:1.6;">エクスポートしたCSVを再度読み込むと、同じ形式のデータを一括登録できます。既存データは上書きされず、追加されます。</p>
    <div class="csv-drop" onclick="document.getElementById('csvFileInput').click()">
      <i class="ti ti-upload" style="font-size:24px;display:block;margin-bottom:6px;" aria-hidden="true"></i>
      CSVファイルを選択してアップロード
    </div>
    <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="importCSV(this)">
    <div id="importStatus" style="font-size:12px;color:#3B6D11;margin-top:8px;"></div>
  </div>
</div>

<script>
const SL={active:"商談中",approval:"稟議中",contracted:"契約済み",review:"契約内容見直し中",shrink:"シュリンク"};
const SC={active:"s-active",approval:"s-approval",contracted:"s-contracted",review:"s-review",shrink:"s-shrink"};
const STAFF_COLORS=["#534AB7","#3B6D11","#0C447C","#BA7517","#A32D2D","#0F9D58","#8E24AA","#D81B60"];
const JC=[
  {key:"all",label:"すべて",icon:"ti-layout-grid"},
  {key:"it",label:"IT・エンジニア",icon:"ti-device-laptop"},
  {key:"construction",label:"建設・施工管理",icon:"ti-building-skyscraper"},
  {key:"sales",label:"営業",icon:"ti-speakerphone"},
  {key:"office",label:"事務・バックオフィス",icon:"ti-briefcase"},
  {key:"service",label:"販売・サービス",icon:"ti-shopping-bag"},
  {key:"other",label:"その他",icon:"ti-dots"},
];
const MONTHS=["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
const NEG_TYPES=["電話","メール確認","訪問","オンライン商談","内定承諾","その他"];

const GAS_URL = 'https://script.google.com/macros/s/AKfycbz6c8-F06C6eVWR3U-t1Muo02_hwLTN7enwazUoJNINHwX5x0Ya7DtllWWuLGU0RG-6zg/exec';

let companies=[];
let staffList=[]; // {id, name, color}
let homeData={links:[],rules:""};
let currentView='main'; // 'main' or 'home'
let selId=null,filterText="",activeJC="all",activeStaff="all";
let mCTs=[],mPOs=[],editId=null;
let isSaving=false;

/* ── GAS通信 ── */
function jsonpCall(baseUrl,params){
  return new Promise((resolve,reject)=>{
    const cbName='cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{
      delete window[cbName];
      if(script.parentNode)document.body.removeChild(script);
      reject(new Error('タイムアウト'));
    },20000);
    window[cbName]=(data)=>{
      clearTimeout(timer);
      delete window[cbName];
      if(script.parentNode)document.body.removeChild(script);
      resolve(data);
    };
    script.onerror=()=>{clearTimeout(timer);reject(new Error('通信エラー'));};
    script.src=baseUrl+(baseUrl.includes('?')?'&':'?')+params+'&callback='+cbName;
    document.body.appendChild(script);
  });
}

async function gasRead(){
  const res=await jsonpCall(GAS_URL,'action=read');
  return res.data||{companies:[],staff:[],home:{links:[],rules:""}};
}

async function gasWrite(payload){
  const json=JSON.stringify(payload);
  const b64=btoa(unescape(encodeURIComponent(json)));
  const CHUNK=700;
  const chunks=[];
  for(let i=0;i<b64.length;i+=CHUNK) chunks.push(b64.slice(i,i+CHUNK));
  await jsonpCall(GAS_URL,'action=write_start&total='+chunks.length);
  for(let i=0;i<chunks.length;i++){
    await jsonpCall(GAS_URL,'action=write_chunk&idx='+i+'&data='+encodeURIComponent(chunks[i]));
  }
  await jsonpCall(GAS_URL,'action=write_finish');
}

/* データ正規化 */
function normalize(d){
  if(!d)d=[];
  d.forEach(c=>{
    if(!c.bizCards)c.bizCards=[];
    if(!c.notionLinks)c.notionLinks=[];
    if(!c.docs)c.docs=[];
    if(!c.negotiations)c.negotiations=[];
    if(!c.checklist)c.checklist=[];
    c.positions=c.positions||[];
    c.positions.forEach(p=>{
      if(!p.notionLinks)p.notionLinks=[];
      if(!p.monthly)p.monthly={plan:{},achieved:{}};
      if(p.annualCount===undefined)p.annualCount="";
      if(p.memo===undefined)p.memo="";
      if(!p.posStatus)p.posStatus="open";
      if(p.fiscalMonth===undefined)p.fiscalMonth="";
      if(p.budgetTiming===undefined)p.budgetTiming="";
      if(p.channel===undefined)p.channel="";
      if(p.feeNormal===undefined)p.feeNormal="";
      if(p.feeUp===undefined)p.feeUp="";
      if(p.feeUpCondition===undefined)p.feeUpCondition="";
    });
    c.negotiations.forEach(n=>{ if(n.author===undefined)n.author=""; });
  });
  return d.filter(c=>c&&c.name);
}

async function save(){
  localStorage.setItem('ra_v6_cache', JSON.stringify({companies,staff:staffList,home:homeData}));
  if(isSaving)return;
  isSaving=true;
  showSaveStatus('saving');
  try{
    await gasWrite({companies,staff:staffList,home:homeData});
    showSaveStatus('saved');
  }catch(e){
    showSaveStatus('error');
  }finally{
    isSaving=false;
  }
}

function showSaveStatus(state){
  const el=document.getElementById('save-status');
  if(!el)return;
  if(state==='saving'){el.textContent='保存中...';el.style.color='#aaa';}
  else if(state==='saved'){el.textContent='✓ 保存済み';el.style.color='#3B6D11';setTimeout(()=>{el.textContent='';},2000);}
  else{el.textContent='⚠ 保存失敗（ローカルに保持）';el.style.color='#A32D2D';}
}

async function initLoad(){
  const detail=document.getElementById('detailPanel');
  detail.innerHTML='<div class="empty-d"><i class="ti ti-loader" style="font-size:28px;animation:spin 1s linear infinite;" aria-hidden="true"></i><span style="margin-top:8px;">データを読み込み中...</span></div>';
  try{
    let payload=await gasRead();
    let comp=payload.companies||[];
    let staff=payload.staff||[];
    let home=payload.home||{links:[],rules:""};
    if((!comp||comp.length===0)&&(!staff||staff.length===0)){
      const cache=localStorage.getItem('ra_v6_cache');
      if(cache){
        const c=JSON.parse(cache);
        comp=c.companies||[];staff=c.staff||[];home=c.home||{links:[],rules:""};
        await gasWrite({companies:comp,staff,home});
      }
    }
    companies=normalize(comp);
    staffList=staff.length?staff:[{id:'inadama',name:'稲玉千尋',color:'#534AB7'},{id:'takemura',name:'竹村厚美',color:'#3B6D11'}];
    homeData=home;
  }catch(e){
    const cache=localStorage.getItem('ra_v6_cache');
    if(cache){
      const c=JSON.parse(cache);
      companies=normalize(c.companies||[]);
      staffList=c.staff&&c.staff.length?c.staff:[{id:'inadama',name:'稲玉千尋',color:'#534AB7'},{id:'takemura',name:'竹村厚美',color:'#3B6D11'}];
      homeData=c.home||{links:[],rules:""};
    }else{
      companies=[];staffList=[{id:'inadama',name:'稲玉千尋',color:'#534AB7'},{id:'takemura',name:'竹村厚美',color:'#3B6D11'}];homeData={links:[],rules:""};
    }
    showSaveStatus('error');
  }
  detail.innerHTML='<div class="empty-d"><i class="ti ti-building" style="font-size:32px;" aria-hidden="true"></i>企業を選択してください</div>';
  renderJT();
  renderStaffSidebar();
  renderList();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sb(s){return `<span class="sb ${SC[s]||'s-active'}">${SL[s]||s}</span>`;}
function staffById(id){return staffList.find(s=>s.id===id);}
function staffOptionsHTML(selectedId){
  return staffList.map(s=>`<option value="${s.id}"${selectedId===s.id?' selected':''}>${esc(s.name)}</option>`).join('');
}

/* ── ホーム / メイン 切替 ── */
function showHome(){
  currentView='home';
  document.getElementById('nav-home').className='home-btn active';
  document.getElementById('mainArea').style.display='none';
  document.getElementById('homeArea').style.display='block';

}
function showMain(){

  document.getElementById('nav-home').className='home-btn';
  document.getElementById('mainArea').style.display='flex';
  document.getElementById('homeArea').style.display='none';
}

function renderHome(){
  const el=document.getElementById('homeArea');
  el.innerHTML=`
    <div class="home-title">RA管理ホーム</div>
    <div class="home-sub">RA担当全員で共有する情報をまとめています</div>

    <button class="go-tool-btn" onclick="showMain()"><i class="ti ti-arrow-right" aria-hidden="true"></i>企業管理ツールを開く</button>

    <div class="home-card" style="margin-top:24px;">
      <div class="home-card-title"><i class="ti ti-link" aria-hidden="true"></i>共有リンク（スプレッドシート・資料など）</div>
      <div id="homeLinkList"></div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <input class="fi" type="text" id="hl-title" placeholder="リンク名（例: RA共通スプレッドシート）">
        <input class="fi" type="text" id="hl-url" placeholder="https://..." style="flex:1.5;">
        <button class="btn primary sm" onclick="addHomeLink()"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
      </div>
    </div>

    <div class="home-card">
      <div class="home-card-title"><i class="ti ti-clipboard-text" aria-hidden="true"></i>共通ルール・掲示板</div>
      <div class="rule-box" id="ruleDisplay" onclick="editRules()">${homeData.rules?esc(homeData.rules):'<span style="color:#ccc;">クリックしてルールを記入してください（共有事項・注意点など）</span>'}</div>
    </div>
  `;
  renderHomeLinks();
}

function renderHomeLinks(){
  const el=document.getElementById('homeLinkList');
  if(!el)return;
  el.innerHTML=(homeData.links||[]).map((l,i)=>`
    <div class="link-row">
      <i class="ti ti-external-link lk-icon" aria-hidden="true"></i>
      <div class="lk-title">${esc(l.title)}</div>
      <div class="lk-url">${esc(l.url)}</div>
      <button class="icon-btn" onclick="window.open(${JSON.stringify(l.url)},'_blank')"><i class="ti ti-arrow-up-right" aria-hidden="true"></i></button>
      <button class="icon-btn" onclick="removeHomeLink(${i})"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>`).join('')||'<div style="font-size:12px;color:#ccc;padding:6px 0;">リンク未登録</div>';
}

function addHomeLink(){
  const t=document.getElementById('hl-title').value.trim();
  const u=document.getElementById('hl-url').value.trim();
  if(!t||!u){alert('リンク名とURLを両方入力してください');return;}
  if(!homeData.links)homeData.links=[];
  homeData.links.push({title:t,url:u});
  document.getElementById('hl-title').value='';
  document.getElementById('hl-url').value='';
  save();renderHomeLinks();
}
function removeHomeLink(i){homeData.links.splice(i,1);save();renderHomeLinks();}

function editRules(){
  const el=document.getElementById('ruleDisplay');
  el.outerHTML=`<textarea class="ta" id="ruleEdit" style="min-height:140px;" onblur="saveRules()">${esc(homeData.rules||'')}</textarea>`;
  document.getElementById('ruleEdit').focus();
}
function saveRules(){
  const v=document.getElementById('ruleEdit').value;
  homeData.rules=v;
  save();
  renderHome();
}

/* ── 担当者管理 ── */
function renderStaffSidebar(){
  const el=document.getElementById('staffListSidebar');
  el.innerHTML=staffList.map(s=>`
    <div class="staff-btn ${activeStaff===s.id?'active':''}" id="sf-${s.id}" onclick="setStaff('${s.id}')">
      <div class="sav" style="background:${s.color};">${s.name.slice(0,1)}</div>${esc(s.name)}
    </div>`).join('');
}

function openAddStaffModal(){
  renderStaffMgmt();
  document.getElementById('staffModalOv').className='modal-ov open';
}
function closeStaffModal(){document.getElementById('staffModalOv').className='modal-ov';}
function renderStaffMgmt(){
  document.getElementById('staffMgmtList').innerHTML=staffList.map(s=>`
    <div class="entry-row">
      <div class="sav" style="background:${s.color};">${s.name.slice(0,1)}</div>
      <div style="flex:1;">${esc(s.name)}</div>
      <span class="staff-del-btn" onclick="removeStaff('${s.id}')"><i class="ti ti-trash" aria-hidden="true"></i></span>
    </div>`).join('')||'<div style="font-size:12px;color:#ccc;">担当者がいません</div>';
}
function addNewStaff(){
  const name=document.getElementById('new-staff-name').value.trim();
  if(!name)return;
  const id='staff_'+Date.now();
  const color=STAFF_COLORS[staffList.length%STAFF_COLORS.length];
  staffList.push({id,name,color});
  document.getElementById('new-staff-name').value='';
  save();renderStaffMgmt();renderStaffSidebar();
}
function removeStaff(id){
  if(!confirm('この担当者を削除しますか？担当中の企業は「未設定」になります。'))return;
  staffList=staffList.filter(s=>s.id!==id);
  companies.forEach(c=>{ if(c.staff===id)c.staff=''; });
  if(activeStaff===id)activeStaff='all';
  save();renderStaffMgmt();renderStaffSidebar();renderList();
}

/* ── サイドバー：職種タブ ── */
function renderJT(){
  document.getElementById("jobTabs").innerHTML=JC.map(j=>{
    const n=j.key==="all"?companies.length:companies.filter(c=>c.jobcat===j.key).length;
    return `<div class="job-tab ${activeJC===j.key?'active':''}" onclick="setJC('${j.key}')">
      <span style="display:flex;align-items:center;gap:5px;"><i class="ti ${j.icon}" style="font-size:12px;" aria-hidden="true"></i>${j.label}</span>
      <span class="jtc">${n}</span></div>`;
  }).join('');
}
function setJC(c){activeJC=c;renderJT();renderList();}
function setStaff(s){
  activeStaff=s;
  document.getElementById('sf-all').className='staff-btn'+(s==='all'?' active':'');
  staffList.forEach(st=>{const e=document.getElementById('sf-'+st.id);if(e)e.className='staff-btn'+(s===st.id?' active':'');});
  document.getElementById("listTitle").textContent=s==="all"?"企業一覧":(staffById(s)?staffById(s).name+'の担当':'企業一覧');
  renderList();
}

/* ── 企業リスト ── */
function filterList(v){filterText=v.toLowerCase();renderList();}
function renderList(){
  const el=document.getElementById("coList");
  const list=companies.filter(c=>{
    if(activeJC!=="all"&&c.jobcat!==activeJC)return false;
    if(activeStaff!=="all"&&c.staff!==activeStaff)return false;
    if(filterText&&!c.name.toLowerCase().includes(filterText))return false;
    return true;
  });
  el.innerHTML=list.map(c=>{
    const undone=c.checklist.filter(x=>!x.done&&x.priority==="high").length;
    const st=staffById(c.staff);
    return `<div class="co-card ${selId===c.id?'selected':''}" onclick="selCo(${c.id})">
      <div class="co-top">
        <div class="co-icon">${c.name.replace(/株式会社|合同会社/g,'').trim().slice(0,2)}</div>
        <div class="co-name">${esc(c.name)}</div>${sb(c.status)}
      </div>
      <div class="co-btm">
        <div class="mchip"><i class="ti ti-message" style="font-size:11px;" aria-hidden="true"></i>${c.negotiations.length}件</div>
        ${st?`<div class="mchip"><div style="width:14px;height:14px;border-radius:50%;background:${st.color};color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;">${st.name.slice(0,1)}</div>${esc(st.name)}</div>`:''}
        ${undone>0?`<div class="mchip" style="color:#A32D2D;"><i class="ti ti-alert-circle" style="font-size:11px;" aria-hidden="true"></i>要確認</div>`:''}
      </div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:28px;color:#ccc;font-size:12px;">該当企業なし</div>';
}

/* ── 詳細パネル ── */

  const undone=c.checklist.filter(x=>!x.done).length;
  const st=staffById(c.staff);

        <div class="co-icon" style="width:38px;height:38px;font-size:13px;border-radius:9px;">${c.name.replace(/株式会社|合同会社/g,'').trim().slice(0,2)}</div>
        <div style="flex:1;"><div class="d-name">${esc(c.name)}</div><div class="d-sub">${esc(c.industry||'')}${c.size?' · '+esc(c.size):''}</div></div>
        ${sb(c.status)}
      </div>
      <div class="d-actions">
        ${st?`<div style="display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;background:${st.color}22;color:${st.color};"><i class="ti ti-user" style="font-size:11px;" aria-hidden="true"></i>${esc(st.name)}</div>`:''}
        <button class="btn sm" onclick="openEditModal(${id})"><i class="ti ti-edit" aria-hidden="true"></i>編集</button>
        <button class="btn sm danger" onclick="delCo(${id})"><i class="ti ti-trash" aria-hidden="true"></i></button>

    <div class="tab-bar">

      <div class="tab" id="tab-pos" onclick="swTab('pos',${id})">ポジション</div>
      <div class="tab" id="tab-chk" onclick="swTab('chk',${id})">確認事項${undone>0?' ('+undone+')':''}</div>
    </div>
    <div class="d-body">
      <div id="tc-neg" class="d-content">${renderNeg(c)}</div>
      <div id="tc-info" class="d-content" style="display:none">${renderInfo(c)}</div>
      <div id="tc-pos" class="d-content" style="display:none">${renderPos(c)}</div>
      <div id="tc-chk" class="d-content" style="display:none">${renderChk(c)}</div>
    </div>`;
}

function swTab(tab,id){
  ["neg","info","pos","chk"].forEach(t=>{
    const el=document.getElementById("tab-"+t),ct=document.getElementById("tc-"+t);
    if(el)el.className="tab"+(t===tab?" active":"");
    if(ct)ct.style.display=t===tab?"block":"none";
  });
}

/* ── 折衝履歴 ── */
function renderNeg(c){
  return `
    <div class="add-box" style="margin-bottom:18px;">
      <div class="add-box-title">折衝内容を記録</div>
      <div class="frow">
        <div class="fg"><label class="fl">日付</label><input class="fi" type="date" id="nd-${c.id}" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="fg"><label class="fl">種別</label><select class="fi" id="nt-${c.id}">${NEG_TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">記載者</label><select class="fi" id="na-${c.id}"><option value="">未選択</option>${staffOptionsHTML('')}</select></div>
      </div>
      <div class="fg" style="margin-top:6px;"><label class="fl">折衝内容</label><textarea class="ta" id="nb-${c.id}" placeholder="話した内容・確認事項・結果など..." style="min-height:120px;"></textarea></div>
      <div class="fg" style="margin-top:6px;"><label class="fl">次回アクション</label><input class="fi" type="text" id="nn-${c.id}" placeholder="例: 来週までに採用要件を書面で受領"></div>

function negHTML(cid,n){
  const author=staffById(n.author);
  return `
    <div class="neg-hdr">
      <span class="neg-date">${n.date}</span>
      <span class="neg-type-badge">${esc(n.type)}</span>
      ${author?`<span class="neg-author-badge"><i class="ti ti-user" style="font-size:10px;" aria-hidden="true"></i>${esc(author.name)}</span>`:''}
      <div style="margin-left:auto;display:flex;gap:2px;">
        <button class="icon-btn" title="編集" onclick="startEditNeg(${cid},${n.id})"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="icon-btn" title="削除" onclick="removeNeg(${cid},${n.id})"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>
    </div>
    <div class="neg-body">${esc(n.content)}</div>
    ${n.nextAction?`<div class="neg-next-box"><i class="ti ti-arrow-right" aria-hidden="true"></i>次回：${esc(n.nextAction)}</div>`:''}`;
}

function addNeg(cid){
  const c=companies.find(x=>x.id===cid);
  const body=document.getElementById(`nb-${cid}`).value.trim();
  if(!body){alert("折衝内容を入力してください");return;}
  const newId=Math.max(0,...c.negotiations.map(x=>x.id))+1;
  c.negotiations.push({id:newId,date:document.getElementById(`nd-${cid}`).value,type:document.getElementById(`nt-${cid}`).value,author:document.getElementById(`na-${cid}`).value,content:body,nextAction:document.getElementById(`nn-${cid}`).value});
  document.getElementById(`nb-${cid}`).value="";
  document.getElementById(`nn-${cid}`).value="";
  save();selCo(cid);swTab('neg',cid);
}
function removeNeg(cid,id){
  if(!confirm("この折衝記録を削除しますか？"))return;
  companies.find(x=>x.id===cid).negotiations=companies.find(x=>x.id===cid).negotiations.filter(x=>x.id!==id);
  save();selCo(cid);swTab('neg',cid);
}
function startEditNeg(cid,nid){
  const c=companies.find(x=>x.id===cid);
  const n=c.negotiations.find(x=>x.id===nid);
  const el=document.getElementById(`ni-${cid}-${nid}`);
  if(!el)return;
  el.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:7px;">
      <div class="frow">
        <input class="fi" type="date" id="ed-${cid}-${nid}" value="${n.date}" style="flex:1;">
        <select class="fi" id="et-${cid}-${nid}" style="flex:1;">${NEG_TYPES.map(t=>`<option${n.type===t?' selected':''}>${t}</option>`).join('')}</select>
        <select class="fi" id="ea-${cid}-${nid}" style="flex:1;"><option value="">未選択</option>${staffOptionsHTML(n.author)}</select>

function saveEditNeg(cid,nid){
  const c=companies.find(x=>x.id===cid),n=c.negotiations.find(x=>x.id===nid);
  n.date=document.getElementById(`ed-${cid}-${nid}`).value;

  n.author=document.getElementById(`ea-${cid}-${nid}`).value;
  n.content=document.getElementById(`eb-${cid}-${nid}`).value;
  n.nextAction=document.getElementById(`en-${cid}-${nid}`).value;
  save();selCo(cid);swTab('neg',cid);
}
function cancelEditNeg(cid,nid){

/* ── 確認事項 ── */
function renderChk(c){
  const done=c.checklist.filter(x=>x.done).length;
  const pct=c.checklist.length?Math.round(done/c.checklist.length*100):0;
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;"><div class="prog"><div class="prog-f" style="width:${pct}%;"></div></div><span style="font-size:11px;color:#aaa;">${done}/${c.checklist.length}</span></div>
    <div id="cl-${c.id}">${c.checklist.map(i=>ciHTML(c.id,i)).join('')}</div>
    <div style="display:flex;gap:5px;margin-top:12px;">
      <select id="clp-${c.id}" style="padding:6px 7px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff;width:58px;"><option value="high">高</option><option value="med" selected>中</option><option value="low">低</option></select>
      <input class="fi" type="text" id="cli-${c.id}" placeholder="確認事項を追加..." onkeydown="if(event.key==='Enter')addChk(${c.id})">
      <button class="btn primary sm" onclick="addChk(${c.id})"><i class="ti ti-plus" aria-hidden="true"></i></button>
    </div>
    <div class="divider"></div>
    <label class="fl">メモ</label>
    <textarea class="ta" onblur="upF(${c.id},'checkMemo',this.value)">${esc(c.checkMemo||'')}</textarea>`;
}
function ciHTML(cid,item){
  const pc=item.priority==='high'?'ph':item.priority==='med'?'pm':'pl';
  const pl=item.priority==='high'?'優先高':item.priority==='med'?'優先中':'優先低';
  const editing=item._editing;
  if(editing){
    return `<div class="ci" id="ci-${cid}-${item.id}">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
        <input class="fi" type="text" id="cie-text-${cid}-${item.id}" value="${esc(item.text)}">
        <div class="frow">
          <select class="fi" id="cie-pri-${cid}-${item.id}" style="flex:1;"><option value="high"${item.priority==='high'?' selected':''}>優先高</option><option value="med"${item.priority==='med'?' selected':''}>優先中</option><option value="low"${item.priority==='low'?' selected':''}>優先低</option></select>
          <input class="fi" type="text" id="cie-note-${cid}-${item.id}" value="${esc(item.note||'')}" placeholder="補足メモ" style="flex:2;">
        </div>
        <div style="display:flex;gap:6px;justify-content:flex-end;">
          <button class="btn sm" onclick="cancelEditChk(${cid},${item.id})">キャンセル</button>
          <button class="btn primary sm" onclick="saveEditChk(${cid},${item.id})">保存</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="ci" id="ci-${cid}-${item.id}">
    <div class="cb ${item.done?'checked':''}" onclick="togChk(${cid},${item.id})">${item.done?'<i class="ti ti-check" aria-hidden="true"></i>':''}</div>
    <div style="flex:1;"><div class="cl ${item.done?'done':''}">${esc(item.text)}</div>${item.note?`<div style="font-size:11px;color:#aaa;margin-top:1px;">${esc(item.note)}</div>`:''}</div>
    <span class="cpri ${pc}">${pl}</span>
    <div style="display:flex;gap:1px;">
      <button class="icon-btn" title="編集" onclick="startEditChk(${cid},${item.id})"><i class="ti ti-edit" aria-hidden="true" style="font-size:13px;"></i></button>
      <button class="icon-btn" title="削除" onclick="removeChk(${cid},${item.id})"><i class="ti ti-trash" aria-hidden="true" style="font-size:13px;"></i></button>
    </div>
  </div>`;
}

/* ── 更新関数群 ── */
function upF(id,k,v){companies.find(x=>x.id===id)[k]=v;save();renderList();}
function upPosF(cid,pi,k,v){companies.find(x=>x.id===cid).positions[pi][k]=v;save();}
function upMonthly(cid,pi,type,month,v){const c=companies.find(x=>x.id===cid);if(!c.positions[pi].monthly)c.positions[pi].monthly={plan:{},achieved:{}};c.positions[pi].monthly[type][month]=v;save();}
function addCT(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`ac-n-${cid}`).value.trim();if(!n)return;c.contacts.push({name:n,dept:document.getElementById(`ac-d-${cid}`).value,role:document.getElementById(`ac-r-${cid}`).value,phone:document.getElementById(`ac-p-${cid}`).value,email:document.getElementById(`ac-e-${cid}`).value});save();selCo(cid);swTab('info',cid);}
function removeCT(cid,i){companies.find(x=>x.id===cid).contacts.splice(i,1);save();selCo(cid);swTab('info',cid);}
function addPos(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`apn-${cid}`).value.trim();if(!n)return;c.positions.push({id:Date.now(),name:n,budget:0,fiscalMonth:"",budgetTiming:"",channel:"",feeNormal:"",feeUp:"",feeUpCondition:"",annualCount:"",posStatus:"open",notionLinks:[],monthly:{plan:{},achieved:{}},memo:""});save();selCo(cid);swTab('pos',cid);}
function removePos(cid,i){if(!confirm("このポジションを削除しますか？"))return;companies.find(x=>x.id===cid).positions.splice(i,1);save();selCo(cid);swTab('pos',cid);}
function addPosNotion(cid,pi){
  const t=document.getElementById(`pnt-${cid}-${pi}`).value.trim();
  const u=document.getElementById(`pnu-${cid}-${pi}`).value.trim();
  if(!t||!u){alert("ページ名とURLを両方入力してください");return;}
  const c=companies.find(x=>x.id===cid);
  if(!c.positions[pi].notionLinks)c.positions[pi].notionLinks=[];
  c.positions[pi].notionLinks.push({title:t,url:u});
  save();selCo(cid);swTab('pos',cid);
}
function removePosNotion(cid,pi,ni){companies.find(x=>x.id===cid).positions[pi].notionLinks.splice(ni,1);save();selCo(cid);swTab('pos',cid);}
function addDoc(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`dn-${cid}`).value.trim();if(!n)return;c.docs.push({name:n,type:document.getElementById(`dt-${cid}`).value,date:new Date().toISOString().slice(0,10),url:document.getElementById(`du-${cid}`).value||"#"});save();selCo(cid);swTab('info',cid);}
function removeDoc(cid,i){companies.find(x=>x.id===cid).docs.splice(i,1);save();selCo(cid);swTab('info',cid);}
function addNotion(cid){
  const t=document.getElementById(`nlt-${cid}`).value.trim();
  const u=document.getElementById(`nlu-${cid}`).value.trim();
  if(!t||!u){alert("ページ名とURLを両方入力してください");return;}
  companies.find(x=>x.id===cid).notionLinks.push({title:t,url:u});
  save();selCo(cid);swTab('info',cid);
}
function removeNotion(cid,i){companies.find(x=>x.id===cid).notionLinks.splice(i,1);save();selCo(cid);swTab('info',cid);}
function togChk(cid,itemId){const c=companies.find(x=>x.id===cid),item=c.checklist.find(x=>x.id===itemId);item.done=!item.done;save();const el=document.getElementById(`cl-${cid}`);if(el)el.innerHTML=c.checklist.map(i=>ciHTML(cid,i)).join('');renderList();}

function cancelEditChk(cid,itemId){const c=companies.find(x=>x.id===cid),item=c.checklist.find(x=>x.id===itemId);delete item._editing;const el=document.getElementById(`ci-${cid}-${itemId}`);if(el)el.outerHTML=ciHTML(cid,item);}

function removeChk(cid,itemId){
  if(!confirm('この確認事項を削除しますか？'))return;
  const c=companies.find(x=>x.id===cid);
  c.checklist=c.checklist.filter(x=>x.id!==itemId);
  save();
  const el=document.getElementById(`cl-${cid}`);if(el)el.innerHTML=c.checklist.map(i=>ciHTML(cid,i)).join('');
  renderList();
}
function delCo(id){if(!confirm("この企業を削除しますか？"))return;companies=companies.filter(x=>x.id!==id);save();selId=null;renderJT();renderList();document.getElementById("detailPanel").innerHTML='<div class="empty-d"><i class="ti ti-building" style="font-size:32px;" aria-hidden="true"></i>企業を選択してください</div>';}

/* ── モーダル：企業追加・編集 ── */

function openEditModal(id){

function addMP(){const n=document.getElementById("mp-name").value.trim();if(!n)return;mPOs.push({id:Date.now(),name:n,budget:0,fiscalMonth:"",budgetTiming:"",channel:"",feeNormal:"",feeUp:"",feeUpCondition:"",annualCount:"",posStatus:"open",notionLinks:[],monthly:{plan:{},achieved:{}},memo:""});document.getElementById("mp-name").value="";renderMPO();}
function renderMPO(){document.getElementById("m-pos-list").innerHTML=mPOs.map((p,i)=>`<div class="entry-row"><div style="flex:1;"><strong>${esc(p.name)}</strong></div><button class="icon-btn" onclick="mPOs.splice(${i},1);renderMPO()"><i class="ti ti-x" aria-hidden="true"></i></button></div>`).join('');}
function saveCompany(){
  const name=document.getElementById("m-name").value.trim();if(!name){alert("企業名を入力してください");return;}
  const data={name,size:document.getElementById("m-size").value,industry:document.getElementById("m-industry").value,jobcat:document.getElementById("m-jobcat").value,status:document.getElementById("m-status").value,staff:document.getElementById("m-staff").value,contacts:mCTs,positions:mPOs,memo:document.getElementById("m-memo").value};

  else{const newId=Math.max(0,...companies.map(x=>x.id))+1;companies.push({id:newId,...data,negotiations:[],docs:[],notionLinks:[],bizCards:[],checklist:[{id:1,text:"契約書の署名・捺印確認",done:false,priority:"high",note:""},{id:2,text:"成果報酬の説明と同意取得",done:false,priority:"high",note:""},{id:3,text:"採用要件の最新版を書面で受領",done:false,priority:"high",note:""},{id:4,text:"請求先部署・担当者の確認",done:false,priority:"med",note:""},{id:5,text:"求人票の公開範囲の確認",done:false,priority:"low",note:""}],checkMemo:""});}
  save();closeModal();renderJT();renderList();if(editId)selCo(editId);
}

/* ── CSV出力 ── */
function exportCSV(mode){
  const STAFF_NAME={}; staffList.forEach(s=>STAFF_NAME[s.id]=s.name);
  const JL_={all:"未分類",it:"IT・エンジニア",construction:"建設・施工管理",sales:"営業",office:"事務・バックオフィス",service:"販売・サービス",other:"その他"};
  const M=["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
  const targets=mode==='all'?companies:companies.filter(c=>{
    if(activeJC!=="all"&&c.jobcat!==activeJC)return false;
    if(activeStaff!=="all"&&c.staff!==activeStaff)return false;
    return true;
  });
  const rows=[[
    "企業名","業種","従業員規模","主要職種","成約状況","自社担当",
    "担当者名","部署","電話","メール",
    "ポジション名","ポジション状況","集客経路","採用予算(万)","決算月","予算組時期","通常Fee","期間限定FeeUP","FeeUP条件","年間採用数","ポジション備考",
    ...M.map(m=>m+"計画"),"計画合計",...M.map(m=>m+"達成"),"達成合計",
    "直近折衝日","直近記載者","直近折衝内容","直近次回アクション","備考"
  ]];
  targets.forEach(c=>{
    const cts=c.contacts.length>0?c.contacts:[{name:"",dept:"",phone:"",email:""}];
    const pos=c.positions.length>0?c.positions:[{name:"",posStatus:"",channel:"",budget:0,fiscalMonth:"",budgetTiming:"",feeNormal:"",feeUp:"",feeUpCondition:"",annualCount:"",memo:"",monthly:{plan:{},achieved:{}}}];
    const ln=c.negotiations.length>0?[...c.negotiations].sort((a,b)=>b.date.localeCompare(a.date))[0]:null;
    pos.forEach((p,pi)=>{
      cts.forEach((ct,ci)=>{
        const pv=M.map(m=>p.monthly?.plan?.[m]||"");const av=M.map(m=>p.monthly?.achieved?.[m]||"");
        const pt=M.reduce((a,m)=>a+(parseInt(p.monthly?.plan?.[m])||0),0);const at=M.reduce((a,m)=>a+(parseInt(p.monthly?.achieved?.[m])||0),0);
        const f=ci===0&&pi===0;
        rows.push([
          f?c.name:"",f?c.industry||"":"",f?c.size||"":"",f?JL_[c.jobcat]||"":"",f?SL[c.status]||"":"",f?(STAFF_NAME[c.staff]||""):"",
          ct.name||"",ct.dept||"",ct.phone||"",ct.email||"",
          ci===0?p.name||"":"",ci===0?p.posStatus||"":"",ci===0?p.channel||"":"",ci===0?p.budget||"":"",ci===0?p.fiscalMonth||"":"",ci===0?p.budgetTiming||"":"",ci===0?p.feeNormal||"":"",ci===0?p.feeUp||"":"",ci===0?p.feeUpCondition||"":"",ci===0?p.annualCount||"":"",ci===0?p.memo||"":"",
          ...(ci===0?pv:M.map(()=>"")),ci===0?pt:"",
          ...(ci===0?av:M.map(()=>"")),ci===0?at:"",
          f?ln?.date||"":"",f?(STAFF_NAME[ln?.author]||""):"",f?ln?.content||"":"",f?ln?.nextAction||"":"",f?c.memo||"":""
        ]);
      });
    });
  });
  const csv="\uFEFF"+rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=(mode==='all'?'RA企業管理_全件_':'RA企業管理_')+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

/* ── CSVインポート（簡易：企業名＋業種＋職種＋ステータスのみの新規一括登録） ── */
function importCSV(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const text=e.target.result.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){document.getElementById('importStatus').textContent='データ行が見つかりませんでした';return;}
      const headers=parseCsvLine(lines[0]);
      const nameIdx=headers.indexOf('企業名');
      if(nameIdx===-1){document.getElementById('importStatus').textContent='「企業名」列が見つかりません';return;}
      const industryIdx=headers.indexOf('業種');
      const sizeIdx=headers.indexOf('従業員規模');
      const jobcatLabelIdx=headers.indexOf('主要職種');
      const statusLabelIdx=headers.indexOf('成約状況');
      const JL_REV={"未分類":"all","IT・エンジニア":"it","建設・施工管理":"construction","営業":"sales","事務・バックオフィス":"office","販売・サービス":"service","その他":"other"};
      const SL_REV={}; Object.keys(SL).forEach(k=>SL_REV[SL[k]]=k);

      let added=0;
      let lastName='';
      for(let i=1;i<lines.length;i++){
        const cols=parseCsvLine(lines[i]);
        const name=cols[nameIdx];
        if(!name)continue; // サブ行（担当者やポジションの追加行）はスキップ
        if(name===lastName)continue;
        lastName=name;
        const newId=Math.max(0,...companies.map(x=>x.id),0)+added+1;
        companies.push({
          id:newId,name,
          industry:industryIdx>-1?cols[industryIdx]||"":"",
          size:sizeIdx>-1?cols[sizeIdx]||"":"",
          jobcat:jobcatLabelIdx>-1?(JL_REV[cols[jobcatLabelIdx]]||"all"):"all",
          status:statusLabelIdx>-1?(SL_REV[cols[statusLabelIdx]]||"active"):"active",
          staff:"",contacts:[],positions:[],negotiations:[],docs:[],notionLinks:[],bizCards:[],
          checklist:[{id:1,text:"契約書の署名・捺印確認",done:false,priority:"high",note:""},{id:2,text:"成果報酬の説明と同意取得",done:false,priority:"high",note:""},{id:3,text:"採用要件の最新版を書面で受領",done:false,priority:"high",note:""},{id:4,text:"請求先部署・担当者の確認",done:false,priority:"med",note:""},{id:5,text:"求人票の公開範囲の確認",done:false,priority:"low",note:""}],
          checkMemo:"",memo:""
        });
        added++;
      }
      save();renderJT();renderList();
      document.getElementById('importStatus').textContent=`${added}件の企業を追加しました（基本情報のみ・詳細は個別に編集してください）`;
    }catch(err){
      document.getElementById('importStatus').textContent='読み込みエラー: '+err.toString();
    }
  };
  reader.readAsText(file,'UTF-8');
}
function parseCsvLine(line){
  const result=[];let cur='';let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'){
        if(line[i+1]==='"'){cur+='"';i++;}else{inQuotes=false;}
      }else{cur+=ch;}
    }else{
      if(ch==='"'){inQuotes=true;}
      else if(ch===','){result.push(cur);cur='';}
      else{cur+=ch;}
    }
  }
  result.push(cur);
  return result;
}

function openImportExportModal(){document.getElementById('csvModalOv').className='modal-ov open';document.getElementById('importStatus').textContent='';}
function closeCsvModal(){document.getElementById('csvModalOv').className='modal-ov';}
