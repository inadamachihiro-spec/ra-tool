<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RA企業管理ツール</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px;}
.app{display:flex;height:100vh;}
.sidebar{width:180px;flex-shrink:0;border-right:1px solid #e5e5e0;padding:16px 0;background:#fafaf8;display:flex;flex-direction:column;}
.sidebar-logo{font-size:13px;font-weight:500;padding:0 14px 14px;border-bottom:1px solid #e5e5e0;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px;cursor:pointer;color:#666;font-size:13px;border-left:2px solid transparent;}
.nav-item:hover{background:#f0f0ea;color:#1a1a1a;}
.nav-item.active{color:#1a1a1a;border-left-color:#534AB7;background:#fff;font-weight:500;}
.nav-item i{font-size:16px;}
.main{width:300px;flex-shrink:0;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid #e5e5e0;}
.topbar{padding:10px 14px;border-bottom:1px solid #e5e5e0;display:flex;align-items:center;gap:8px;background:#fff;}
.topbar h1{font-size:13px;font-weight:500;flex:1;}
.btn{padding:5px 12px;border-radius:8px;border:1px solid #ddd;background:transparent;font-size:12px;cursor:pointer;color:#1a1a1a;display:inline-flex;align-items:center;gap:5px;transition:background 0.1s;}
.btn:hover{background:#f5f5f0;}
.btn.primary{background:#534AB7;color:#fff;border-color:#534AB7;}
.btn.primary:hover{background:#3C3489;}
.btn.danger{color:#A32D2D;border-color:#fcc;}
.btn.danger:hover{background:#fff5f5;}
.btn.sm{padding:4px 9px;font-size:11px;}
.content{flex:1;overflow-y:auto;padding:12px;}
.search-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid #e5e5e0;border-radius:8px;background:#fff;margin-bottom:10px;}
.search-bar input{border:none;background:transparent;flex:1;font-size:12px;color:#1a1a1a;outline:none;}
.company-list{display:flex;flex-direction:column;gap:6px;}
.company-card{background:#fff;border:1px solid #e5e5e0;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color 0.15s;}
.company-card:hover{border-color:#bbb;}
.company-card.selected{border-color:#534AB7;background:#fdfcff;}
.company-top{display:flex;align-items:center;gap:8px;}
.company-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:11px;flex-shrink:0;background:#EEEDFE;color:#3C3489;}
.company-name{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.status-badge{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.s-active{background:#EAF3DE;color:#3B6D11;}
.s-approval{background:#E6F1FB;color:#0C447C;}
.s-contracted{background:#EEEDFE;color:#3C3489;}
.s-review{background:#FAEEDA;color:#633806;}
.s-shrink{background:#FCEBEB;color:#A32D2D;}
.company-bottom{display:flex;align-items:center;gap:8px;margin-top:6px;}
.meta-chip{display:flex;align-items:center;gap:3px;font-size:10px;color:#aaa;}
/* 右パネル */
.detail{flex:1;overflow-y:auto;background:#fff;}
.detail-header{padding:16px 20px;border-bottom:1px solid #e5e5e0;background:#fff;}
.detail-name{font-size:17px;font-weight:500;}
.detail-sub{font-size:12px;color:#999;margin-top:2px;}
.detail-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.tab-bar{display:flex;border-bottom:1px solid #e5e5e0;padding:0 20px;background:#fff;overflow-x:auto;}
.tab{padding:10px 0;margin-right:16px;font-size:12px;cursor:pointer;color:#999;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;}
.tab.active{color:#1a1a1a;border-bottom-color:#534AB7;font-weight:500;}
.detail-content{padding:20px;}
.field-label{font-size:10px;color:#999;margin-bottom:5px;letter-spacing:0.05em;text-transform:uppercase;font-weight:500;}
.field-value{font-size:13px;margin-bottom:16px;line-height:1.6;}
.divider{border:none;border-top:1px solid #f0f0ea;margin:16px 0;}
.form-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;}
.form-input:focus{outline:none;border-color:#534AB7;}
.form-row{display:flex;gap:8px;}
.form-row .fg{flex:1;}
.fg{margin-bottom:12px;}
.memo-area{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;resize:vertical;min-height:72px;background:#fff;color:#1a1a1a;}
.memo-area:focus{outline:none;border-color:#534AB7;}
/* 折衝履歴 */
.negotiation-item{background:#fafaf8;border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid #534AB7;}
.neg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.neg-date{font-size:12px;font-weight:500;color:#534AB7;}
.neg-type{font-size:10px;padding:2px 7px;border-radius:20px;background:#EEEDFE;color:#3C3489;}
.neg-body{font-size:13px;color:#1a1a1a;line-height:1.7;margin-bottom:8px;white-space:pre-wrap;}
.neg-next{font-size:12px;color:#666;display:flex;align-items:flex-start;gap:6px;background:#f0f0ea;border-radius:6px;padding:7px 10px;}
.neg-next i{color:#534AB7;font-size:14px;flex-shrink:0;margin-top:1px;}
.add-neg-form{background:#fafaf8;border-radius:10px;padding:16px;border:1px dashed #ddd;}
.add-neg-title{font-size:12px;font-weight:500;color:#555;margin-bottom:12px;}
/* チェックリスト */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0ea;}
.check-item:last-child{border-bottom:none;}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid #ccc;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff;}
.check-box.checked{background:#534AB7;border-color:#534AB7;}
.check-box.checked i{color:#fff;font-size:12px;}
.check-label{font-size:13px;flex:1;line-height:1.5;}
.check-label.done{color:#aaa;text-decoration:line-through;}
.check-priority{font-size:10px;padding:2px 6px;border-radius:20px;flex-shrink:0;}
.p-high{background:#FCEBEB;color:#A32D2D;}
.p-med{background:#FAEEDA;color:#633806;}
.p-low{background:#F5F5F0;color:#666;}
.progress-bar{height:5px;background:#f0f0ea;border-radius:4px;overflow:hidden;flex:1;}
.progress-fill{height:100%;background:#534AB7;border-radius:4px;}
/* 書類 */
.doc-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fafaf8;border-radius:8px;margin-bottom:6px;}
.icon-btn{padding:4px 6px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#aaa;display:inline-flex;align-items:center;font-size:14px;}
.icon-btn:hover{background:#f0f0ea;color:#1a1a1a;}
.notion-row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fafaf8;border-radius:8px;margin-bottom:6px;}
.refund-box{background:#fafaf8;border-radius:8px;padding:14px;}
.refund-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0ea;align-items:flex-start;}
.refund-row:last-child{border-bottom:none;}
.refund-label{font-size:11px;color:#999;width:80px;flex-shrink:0;padding-top:2px;}
/* 担当者・ポジション */
.contact-card{background:#fafaf8;border-radius:8px;padding:12px 14px;margin-bottom:8px;}
.pos-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fafaf8;border-radius:8px;margin-bottom:6px;}
.pos-badge{font-size:10px;padding:2px 7px;border-radius:20px;}
.pos-open{background:#EAF3DE;color:#3B6D11;}
.pos-filled{background:#E6F1FB;color:#0C447C;}
.kw-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:#f0f0ea;font-size:11px;margin:2px;border:1px solid #e5e5e0;}
.kw-tag i{font-size:11px;color:#aaa;cursor:pointer;}
.section-title{font-size:11px;font-weight:500;color:#555;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#ccc;font-size:13px;gap:10px;}
/* 職種タブ */
.job-tabs{display:flex;flex-direction:column;gap:2px;padding:8px 10px;border-bottom:1px solid #e5e5e0;}
.job-tab{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:12px;color:#666;transition:background 0.1s;}
.job-tab:hover{background:#f0f0ea;color:#1a1a1a;}
.job-tab.active{background:#EEEDFE;color:#3C3489;font-weight:500;}
.job-tab-count{font-size:10px;padding:1px 6px;border-radius:20px;background:#e5e5e0;color:#888;min-width:18px;text-align:center;}
.job-tab.active .job-tab-count{background:#534AB7;color:#fff;}
.next-box{background:#EEEDFE;border-radius:8px;padding:11px 14px;display:flex;gap:8px;margin-bottom:16px;}
.next-box i{color:#534AB7;font-size:15px;margin-top:1px;flex-shrink:0;}
.next-box-text{font-size:12px;color:#3C3489;line-height:1.6;}
/* モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding:32px 16px;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:520px;max-width:100%;}
.modal-title{font-size:14px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;}
.form-label{font-size:11px;color:#999;margin-bottom:4px;display:block;letter-spacing:0.04em;text-transform:uppercase;}
.pos-entry{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f5f5f0;border-radius:8px;margin-bottom:5px;font-size:12px;}
.contact-entry{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f5f5f0;border-radius:8px;margin-bottom:5px;font-size:12px;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo"><i class="ti ti-building"></i>RA管理</div>
    <div class="nav-item active"><i class="ti ti-building"></i>企業一覧</div>
    <div style="flex:1;"></div>
    <div style="padding:10px 14px;font-size:10px;color:#ccc;border-top:1px solid #e5e5e0;">ver 3.0</div>
  </div>

  <div class="main">
    <div class="topbar">
      <h1>企業一覧</h1>
      <button class="btn primary sm" onclick="openAddModal()"><i class="ti ti-plus"></i>追加</button>
    </div>
    <div class="job-tabs" id="jobTabs"></div>
    <div class="content">
      <div class="search-bar">
        <i class="ti ti-search" style="font-size:14px;color:#ccc;"></i>
        <input type="text" placeholder="企業名で検索..." oninput="filterList(this.value)">
      </div>
      <div class="company-list" id="companyList"></div>
    </div>
  </div>

  <div class="detail" id="detailPanel">
    <div class="empty-detail">
      <i class="ti ti-building" style="font-size:32px;"></i>
      企業を選択してください
    </div>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">
      <span id="modalTitleText">企業を追加</span>
      <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>

    <div class="form-row">
      <div class="fg" style="flex:2;">
        <label class="form-label">企業名 *</label>
        <input class="form-input" type="text" id="m-name" placeholder="例: 株式会社○○">
      </div>
      <div class="fg">
        <label class="form-label">従業員規模</label>
        <input class="form-input" type="text" id="m-size" placeholder="例: 100名">
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label class="form-label">業種</label>
        <input class="form-input" type="text" id="m-industry" placeholder="例: IT・SaaS">
      </div>
      <div class="fg">
        <label class="form-label">主要職種</label>
        <select class="form-input" id="m-jobcat">
          <option value="all">すべて</option>
          <option value="it">IT・エンジニア</option>
          <option value="construction">建設・施工管理</option>
          <option value="sales">営業</option>
          <option value="office">事務・バックオフィス</option>
          <option value="other">その他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label class="form-label">成約状況</label>
        <select class="form-input" id="m-status">
          <option value="active">商談中</option>
          <option value="approval">稟議中</option>
          <option value="contracted">契約済み</option>
          <option value="review">契約内容見直し中</option>
          <option value="shrink">シュリンク</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="fg">
        <label class="form-label">最終折衝日</label>
        <input class="form-input" type="date" id="m-lastcontact">
      </div>
      <div class="fg">
        <label class="form-label">次回アクション</label>
        <input class="form-input" type="text" id="m-nextaction" placeholder="例: 6/20 確認">
      </div>
    </div>

    <div class="divider"></div>
    <div class="add-neg-title" style="font-size:12px;font-weight:500;color:#555;margin-bottom:10px;">担当者</div>
    <div id="m-contacts-list"></div>
    <div style="background:#fafaf8;border-radius:8px;padding:12px;margin-bottom:4px;">
      <div class="form-row">
        <input class="form-input" type="text" id="mc-name" placeholder="担当者名" style="flex:1;">
        <input class="form-input" type="text" id="mc-dept" placeholder="部署" style="flex:1;">
      </div>
      <div class="form-row" style="margin-top:6px;">
        <input class="form-input" type="text" id="mc-role" placeholder="役職・担当ポジション" style="flex:1;">
        <input class="form-input" type="text" id="mc-phone" placeholder="電話番号" style="flex:1;">
      </div>
      <input class="form-input" type="text" id="mc-email" placeholder="メールアドレス" style="margin-top:6px;">
      <button class="btn sm" style="margin-top:8px;" onclick="addModalContact()"><i class="ti ti-plus"></i>担当者を追加</button>
    </div>

    <div class="divider"></div>
    <div class="add-neg-title" style="font-size:12px;font-weight:500;color:#555;margin-bottom:10px;">採用ポジション（複数可）</div>
    <div id="m-positions-list"></div>
    <div style="background:#fafaf8;border-radius:8px;padding:12px;margin-bottom:4px;">
      <input class="form-input" type="text" id="mp-name" placeholder="ポジション名">
      <div class="form-row" style="margin-top:6px;">
        <input class="form-input" type="number" id="mp-count" placeholder="採用人数" min="1" style="flex:1;">
        <input class="form-input" type="number" id="mp-filled" placeholder="充足人数" min="0" style="flex:1;">
        <input class="form-input" type="text" id="mp-salary" placeholder="年収目安" style="flex:1;">
      </div>
      <button class="btn sm" style="margin-top:8px;" onclick="addModalPosition()"><i class="ti ti-plus"></i>ポジションを追加</button>
    </div>

    <div class="divider"></div>
    <div class="add-neg-title" style="font-size:12px;font-weight:500;color:#555;margin-bottom:10px;">返金規定</div>
    <div class="form-row">
      <div class="fg"><input class="form-input" type="text" id="m-rrate" placeholder="返金率（例: 30%）"></div>
      <div class="fg"><input class="form-input" type="text" id="m-rperiod" placeholder="対象期間（例: 入社後90日以内）"></div>
    </div>
    <div class="fg"><input class="form-input" type="text" id="m-rcondition" placeholder="条件（例: 自己都合退職の場合）"></div>
    <div class="fg" style="margin-top:6px;"><input class="form-input" type="text" id="m-rmemo" placeholder="補足"></div>

    <div class="divider"></div>
    <div class="fg">
      <label class="form-label">備考・メモ</label>
      <textarea class="memo-area" id="m-memo" placeholder="特記事項など" style="min-height:60px;"></textarea>
    </div>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick="saveCompany()">保存する</button>
    </div>
  </div>
</div>

<script>
const SL = {active:"商談中",approval:"稟議中",contracted:"契約済み",review:"契約内容見直し中",shrink:"シュリンク"};
const SC = {active:"s-active",approval:"s-approval",contracted:"s-contracted",review:"s-review",shrink:"s-shrink"};
const JOB_CATS = [
  {key:"all",   label:"すべて",         icon:"ti-layout-grid"},
  {key:"it",    label:"IT・エンジニア",  icon:"ti-device-laptop"},
  {key:"construction", label:"建設・施工管理", icon:"ti-building-skyscraper"},
  {key:"sales", label:"営業",           icon:"ti-speakerphone"},
  {key:"office",label:"事務・バックオフィス", icon:"ti-briefcase"},
  {key:"other", label:"その他",         icon:"ti-dots"},
];

let companies = JSON.parse(localStorage.getItem('ra_v3') || 'null') || [
  {
    id:1,name:"株式会社オープンアップコンストラクション",industry:"建設・施工管理",size:"500名以上",
    jobcat:"construction",
    status:"contracted",lastContact:"2026-06-15",nextAction:"小寺さん入社日確定の連絡待ち",
    contacts:[{name:"吉田 恵子",dept:"人事部",role:"採用担当",phone:"",email:"openup-construction@mail3.rpm-sys.jp"},{name:"坂本",dept:"人事部",role:"採用担当",phone:"",email:"hr-recruitment@openup-construction.co.jp"}],
    positions:[{name:"施工管理",count:10,filled:6,salary:"350〜500万"}],
    negotiations:[
      {id:1,date:"2026-06-15",type:"メール確認",content:"蓑浦まひる様：お見送り通知受領\n堀丞様：面接リスケ確定（6/17〜19で再調整依頼）\n遠藤和希様：面接リスケ確定連絡あり",nextAction:"堀さんの日程確認を稲玉さんへ連絡"},
      {id:2,date:"2026-06-12",type:"内定承諾",content:"小寺史織様の内定承諾確認。9月1日入社希望。入社前面談の調整が必要。",nextAction:"9月入社に向けたスケジュール確認"},
      {id:3,date:"2026-06-10",type:"書類選考",content:"野村駿介様：書類通過。面接候補日を6/22・23の18時以降で提出済み。入社希望は最短9月以降。",nextAction:"面接日程の確定待ち"}
    ],
    docs:[],notionLinks:[],
    refund:{rate:"20%",period:"入社後90日以内",condition:"自己都合退職",memo:""},
    checklist:[
      {id:1,text:"契約書の署名・捺印確認",done:true,priority:"high",note:""},
      {id:2,text:"返金規定の説明と同意取得",done:true,priority:"high",note:""},
      {id:3,text:"採用要件の最新版を書面で受領",done:false,priority:"high",note:""},
      {id:4,text:"請求先部署・担当者の確認",done:true,priority:"med",note:"吉田様"},
      {id:5,text:"求人票の公開範囲の確認",done:false,priority:"low",note:""}
    ],
    checkMemo:"",keywords:[],memo:""
  }
];

let selectedId = null;
let filterText = "";
let activeJobCat = "all";
let modalContacts = [];
let modalPositions = [];
let editingId = null;

function save(){ localStorage.setItem('ra_v3', JSON.stringify(companies)); }
function sb(s){ return `<span class="status-badge ${SC[s]||'s-active'}">${SL[s]||s}</span>`; }

function renderJobTabs(){
  const el = document.getElementById("jobTabs");
  el.innerHTML = JOB_CATS.map(j=>{
    const count = j.key==="all" ? companies.length : companies.filter(c=>c.jobcat===j.key).length;
    return `<div class="job-tab ${activeJobCat===j.key?'active':''}" onclick="setJobCat('${j.key}')">
      <span style="display:flex;align-items:center;gap:6px;"><i class="ti ${j.icon}" style="font-size:14px;"></i>${j.label}</span>
      <span class="job-tab-count">${count}</span>
    </div>`;
  }).join('');
}

function setJobCat(cat){ activeJobCat=cat; renderJobTabs(); renderList(); }
function filterList(v){ filterText=v.toLowerCase(); renderList(); }

function renderList(){
  const el = document.getElementById("companyList");
  const filtered = companies.filter(c=>{
    if(activeJobCat!=="all" && c.jobcat!==activeJobCat) return false;
    if(filterText && !c.name.toLowerCase().includes(filterText)) return false;
    return true;
  });
  el.innerHTML = filtered.map(c=>{
    const days = Math.floor((new Date()-new Date(c.lastContact))/86400000);
    const undone = c.checklist.filter(x=>!x.done&&x.priority==="high").length;
    const jLabel = JOB_CATS.find(j=>j.key===c.jobcat)?.label||"";
    return `<div class="company-card ${selectedId===c.id?'selected':''}" onclick="selectCompany(${c.id})">
      <div class="company-top">
        <div class="company-icon">${c.name.replace(/株式会社|合同会社/g,'').trim().slice(0,2)}</div>
        <div class="company-name">${c.name}</div>
        ${sb(c.status)}
      </div>
      <div class="company-bottom">
        <div class="meta-chip"><i class="ti ti-clock" style="font-size:12px;"></i>${days===0?'本日':days+'日前'}</div>
        <div class="meta-chip"><i class="ti ti-message" style="font-size:12px;"></i>${c.negotiations.length}件</div>
        ${undone>0?`<div class="meta-chip" style="color:#A32D2D;"><i class="ti ti-alert-circle" style="font-size:12px;"></i>要確認</div>`:''}
      </div>
    </div>`;
  }).join('')||`<div style="text-align:center;padding:30px;color:#ccc;font-size:12px;">該当する企業がありません</div>`;
}

function switchTab(tab,id){
  ["neg","overview","contacts","positions","docs","check"].forEach(t=>{
    const el=document.getElementById("tab-"+t),ct=document.getElementById("tc-"+t);
    if(el) el.className="tab"+(t===tab?" active":"");
    if(ct) ct.style.display=t===tab?"block":"none";
  });
}

function renderCheck(c){
  const done=c.checklist.filter(x=>x.done).length;
  const pct=c.checklist.length?Math.round(done/c.checklist.length*100):0;
  return `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
      <span style="font-size:11px;color:#aaa;">${done}/${c.checklist.length}</span>
    </div>
    <div id="cl-${c.id}">${c.checklist.map(i=>ciHTML(c.id,i)).join('')}</div>
    <div style="display:flex;gap:6px;margin-top:14px;">
      <select id="cl-pri-${c.id}" style="padding:6px 8px;border:1px solid #ddd;border-radius:8px;font-size:12px;background:#fff;width:64px;">
        <option value="high">高</option><option value="med" selected>中</option><option value="low">低</option>
      </select>
      <input class="form-input" type="text" id="cl-inp-${c.id}" placeholder="確認事項を追加..." onkeydown="if(event.key==='Enter')addCheck(${c.id})">
      <button class="btn primary sm" onclick="addCheck(${c.id})"><i class="ti ti-plus"></i></button>
    </div>
    <div class="divider"></div>
    <label class="form-label">メモ</label>
    <textarea class="memo-area" onblur="updateField(${c.id},'checkMemo',this.value)">${c.checkMemo||''}</textarea>
  `;
}

function ciHTML(cid,item){
  const pc=item.priority==='high'?'p-high':item.priority==='med'?'p-med':'p-low';
  const pl=item.priority==='high'?'優先高':item.priority==='med'?'優先中':'優先低';
  return `<div class="check-item">
    <div class="check-box ${item.done?'checked':''}" onclick="toggleCheck(${cid},${item.id})">${item.done?'<i class="ti ti-check"></i>':''}</div>
    <div style="flex:1;"><div class="check-label ${item.done?'done':''}">${item.text}</div>${item.note?`<div style="font-size:11px;color:#aaa;margin-top:2px;">${item.note}</div>`:''}</div>
    <span class="check-priority ${pc}">${pl}</span>
  </div>`;
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 折衝
function addNeg(cid){
  const c=companies.find(x=>x.id===cid);
  const body=document.getElementById(`neg-body-${cid}`).value.trim();
  if(!body){alert("折衝内容を入力してください");return;}
  const newId=Math.max(...c.negotiations.map(x=>x.id),0)+1;
  c.negotiations.push({id:newId,date:document.getElementById(`neg-date-${cid}`).value,type:document.getElementById(`neg-type-${cid}`).value,content:body,nextAction:document.getElementById(`neg-next-${cid}`).value});
  document.getElementById(`neg-body-${cid}`).value="";
  document.getElementById(`neg-next-${cid}`).value="";
  save(); selectCompany(cid); switchTab('neg',cid);
}
function removeNeg(cid,id){companies.find(x=>x.id===cid).negotiations=companies.find(x=>x.id===cid).negotiations.filter(x=>x.id!==id);save();selectCompany(cid);switchTab('neg',cid);}

// インライン更新
function updateField(id,key,val){companies.find(x=>x.id===id)[key]=val;save();renderList();}
function updateRefund(id,key,val){companies.find(x=>x.id===id).refund[key]=val;save();}
function addKeyword(cid){const c=companies.find(x=>x.id===cid),inp=document.getElementById(`kw-${cid}`),v=inp.value.trim();if(!v)return;c.keywords.push(v);inp.value="";save();selectCompany(cid);switchTab('overview',cid);}
function removeKeyword(cid,i){companies.find(x=>x.id===cid).keywords.splice(i,1);save();selectCompany(cid);switchTab('overview',cid);}
function addContact(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`ac-name-${cid}`).value.trim();if(!n)return;c.contacts.push({name:n,dept:document.getElementById(`ac-dept-${cid}`).value,role:document.getElementById(`ac-role-${cid}`).value,phone:document.getElementById(`ac-phone-${cid}`).value,email:document.getElementById(`ac-email-${cid}`).value});save();selectCompany(cid);switchTab('contacts',cid);}
function removeContact(cid,i){companies.find(x=>x.id===cid).contacts.splice(i,1);save();selectCompany(cid);switchTab('contacts',cid);}
function addPosition(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`ap-name-${cid}`).value.trim();if(!n)return;c.positions.push({name:n,count:parseInt(document.getElementById(`ap-count-${cid}`).value)||1,filled:parseInt(document.getElementById(`ap-filled-${cid}`).value)||0,salary:document.getElementById(`ap-salary-${cid}`).value});save();selectCompany(cid);switchTab('positions',cid);}
function removePosition(cid,i){companies.find(x=>x.id===cid).positions.splice(i,1);save();selectCompany(cid);switchTab('positions',cid);}
function addDoc(cid){const c=companies.find(x=>x.id===cid),n=document.getElementById(`doc-name-${cid}`).value.trim();if(!n)return;c.docs.push({name:n,type:document.getElementById(`doc-type-${cid}`).value,date:new Date().toISOString().slice(0,10),url:document.getElementById(`doc-url-${cid}`).value||"#"});save();selectCompany(cid);switchTab('docs',cid);}
function removeDoc(cid,i){companies.find(x=>x.id===cid).docs.splice(i,1);save();selectCompany(cid);switchTab('docs',cid);}
function addNotion(cid){const c=companies.find(x=>x.id===cid),t=document.getElementById(`notion-title-${cid}`).value.trim(),u=document.getElementById(`notion-url-${cid}`).value.trim();if(!t||!u)return;c.notionLinks.push({title:t,url:u});save();selectCompany(cid);switchTab('docs',cid);}
function removeNotion(cid,i){companies.find(x=>x.id===cid).notionLinks.splice(i,1);save();selectCompany(cid);switchTab('docs',cid);}
function toggleCheck(cid,itemId){const c=companies.find(x=>x.id===cid),item=c.checklist.find(x=>x.id===itemId);item.done=!item.done;save();const el=document.getElementById(`cl-${cid}`);if(el)el.innerHTML=c.checklist.map(i=>ciHTML(cid,i)).join('');renderList();}
function addCheck(cid){const c=companies.find(x=>x.id===cid),inp=document.getElementById(`cl-inp-${cid}`),pri=document.getElementById(`cl-pri-${cid}`),v=inp.value.trim();if(!v)return;c.checklist.push({id:Math.max(...c.checklist.map(x=>x.id),0)+1,text:v,done:false,priority:pri.value,note:""});inp.value="";save();const el=document.getElementById(`cl-${cid}`);if(el)el.innerHTML=c.checklist.map(i=>ciHTML(cid,i)).join('');renderList();}
function deleteCompany(id){if(!confirm("この企業を削除しますか？"))return;companies=companies.filter(x=>x.id!==id);save();selectedId=null;renderJobTabs();renderList();document.getElementById("detailPanel").innerHTML='<div class="empty-detail"><i class="ti ti-building" style="font-size:32px;"></i>企業を選択してください</div>';}

// モーダル
function openAddModal(){
  editingId=null;modalContacts=[];modalPositions=[];
  document.getElementById("modalTitleText").textContent="企業を追加";
  ["m-name","m-size","m-industry","m-nextaction","m-rrate","m-rperiod","m-rcondition","m-rmemo","m-memo"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  document.getElementById("m-status").value="active";
  document.getElementById("m-lastcontact").value=new Date().toISOString().slice(0,10);
  renderModalContacts();renderModalPositions();
  document.getElementById("modalOverlay").className="modal-overlay open";
}
function openEditModal(id){
  const c=companies.find(x=>x.id===id);
  editingId=id;modalContacts=JSON.parse(JSON.stringify(c.contacts));modalPositions=JSON.parse(JSON.stringify(c.positions));
  document.getElementById("modalTitleText").textContent="企業を編集";
  document.getElementById("m-name").value=c.name;
  document.getElementById("m-size").value=c.size||"";
  document.getElementById("m-industry").value=c.industry||"";
  document.getElementById("m-jobcat").value=c.jobcat||"all";
  document.getElementById("m-status").value=c.status||"active";
  document.getElementById("m-lastcontact").value=c.lastContact||"";
  document.getElementById("m-nextaction").value=c.nextAction||"";
  document.getElementById("m-rrate").value=c.refund?.rate||"";
  document.getElementById("m-rperiod").value=c.refund?.period||"";
  document.getElementById("m-rcondition").value=c.refund?.condition||"";
  document.getElementById("m-rmemo").value=c.refund?.memo||"";
  document.getElementById("m-memo").value=c.memo||"";
  renderModalContacts();renderModalPositions();
  document.getElementById("modalOverlay").className="modal-overlay open";
}
function closeModal(){document.getElementById("modalOverlay").className="modal-overlay";}
function addModalContact(){const n=document.getElementById("mc-name").value.trim();if(!n)return;modalContacts.push({name:n,dept:document.getElementById("mc-dept").value,role:document.getElementById("mc-role").value,phone:document.getElementById("mc-phone").value,email:document.getElementById("mc-email").value});["mc-name","mc-dept","mc-role","mc-phone","mc-email"].forEach(id=>document.getElementById(id).value="");renderModalContacts();}
function renderModalContacts(){document.getElementById("m-contacts-list").innerHTML=modalContacts.map((ct,i)=>`<div class="contact-entry"><div style="flex:1;"><strong>${ct.name}</strong>${ct.dept?' · '+ct.dept:''}${ct.role?' · '+ct.role:''}</div><button class="icon-btn" onclick="modalContacts.splice(${i},1);renderModalContacts()"><i class="ti ti-x"></i></button></div>`).join('');}
function addModalPosition(){const n=document.getElementById("mp-name").value.trim();if(!n)return;modalPositions.push({name:n,count:parseInt(document.getElementById("mp-count").value)||1,filled:parseInt(document.getElementById("mp-filled").value)||0,salary:document.getElementById("mp-salary").value});["mp-name","mp-count","mp-filled","mp-salary"].forEach(id=>document.getElementById(id).value="");renderModalPositions();}
function renderModalPositions(){document.getElementById("m-positions-list").innerHTML=modalPositions.map((p,i)=>`<div class="pos-entry"><div style="flex:1;"><strong>${p.name}</strong> ${p.filled}/${p.count}名${p.salary?' · '+p.salary:''}</div><button class="icon-btn" onclick="modalPositions.splice(${i},1);renderModalPositions()"><i class="ti ti-x"></i></button></div>`).join('');}
function saveCompany(){
  const name=document.getElementById("m-name").value.trim();if(!name){alert("企業名を入力してください");return;}
  const data={name,size:document.getElementById("m-size").value,industry:document.getElementById("m-industry").value,jobcat:document.getElementById("m-jobcat").value,status:document.getElementById("m-status").value,lastContact:document.getElementById("m-lastcontact").value||new Date().toISOString().slice(0,10),nextAction:document.getElementById("m-nextaction").value,contacts:modalContacts,positions:modalPositions,refund:{rate:document.getElementById("m-rrate").value,period:document.getElementById("m-rperiod").value,condition:document.getElementById("m-rcondition").value,memo:document.getElementById("m-rmemo").value},memo:document.getElementById("m-memo").value};
  if(editingId){Object.assign(companies.find(x=>x.id===editingId),data);}
  else{const newId=Math.max(...companies.map(x=>x.id),0)+1;companies.push({id:newId,...data,negotiations:[],docs:[],notionLinks:[],keywords:[],checklist:[{id:1,text:"契約書の署名・捺印確認",done:false,priority:"high",note:""},{id:2,text:"返金規定の説明と同意取得",done:false,priority:"high",note:""},{id:3,text:"採用要件の最新版を書面で受領",done:false,priority:"high",note:""},{id:4,text:"請求先部署・担当者の確認",done:false,priority:"med",note:""},{id:5,text:"求人票の公開範囲の確認",done:false,priority:"low",note:""}],checkMemo:""});}
  save();closeModal();renderJobTabs();renderList();if(editingId)selectCompany(editingId);
}

renderJobTabs();
renderList();
</script>
</body>
